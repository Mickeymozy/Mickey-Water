<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Records | Mickey Water Billing System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); color: #0f172a; }
    .page-shell { max-width: 1120px; margin: 0 auto; padding: 28px 18px; }
    .topbar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 16px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18); backdrop-filter: blur(12px); border-radius: 30px; padding: 22px 24px; color: #f8fafc; }
    .topbar h1 { font-size: clamp(1.9rem, 2.7vw, 2.7rem); }
    .topbar p { max-width: 520px; color: rgba(248,250,252,0.88); }
    .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
    .nav-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.08); color: #f8fafc; text-decoration: none; font-weight: 700; }
    .nav-btn:hover { background: rgba(255,255,255,0.18); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin: 28px 0; }
    .stat-card { background: rgba(255,255,255,0.95); border-radius: 24px; padding: 24px; box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18); }
    .stat-card .label { display: block; font-size: 0.78rem; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .stat-card .value { display: block; font-size: 2.2rem; font-weight: 800; color: #0f172a; }
    .section { background: white; border-radius: 28px; padding: 26px; box-shadow: 0 30px 70px rgba(15, 23, 42, 0.12); margin-bottom: 28px; }
    .section-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 18px; margin-bottom: 22px; }
    .section-header h2 { margin: 0; font-size: 1.35rem; color: #0f172a; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; }
    .field { display: flex; flex-direction: column; gap: 10px; }
    .field label { font-weight: 700; color: #334155; }
    .field input, .field select { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid #cbd5e1; font-size: 1rem; color: #0f172a; }
    .field input:focus, .field select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12); }
    .button { display: inline-flex; align-items: center; justify-content: center; padding: 14px 20px; border-radius: 16px; border: none; cursor: pointer; font-weight: 700; transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .button.primary { background: #2563eb; color: white; }
    .button.secondary { background: #e2e8f0; color: #0f172a; }
    .button:hover { transform: translateY(-1px); box-shadow: 0 18px 30px rgba(37, 99, 235, 0.18); }
    .filter-row { display: grid; grid-template-columns: 1fr auto; gap: 16px; width: 100%; }
    .filter-row input { width: 100%; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; min-width: 650px; }
    thead { background: #f8fafc; }
    th, td { padding: 16px 14px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 0.95rem; }
    tbody tr:hover { background: #f1f5f9; }
    .badge { display: inline-flex; align-items: center; justify-content: center; padding: 8px 14px; border-radius: 999px; font-weight: 700; font-size: 0.82rem; }
    .badge.paid { background: #dcfce7; color: #047857; }
    .badge.unpaid { background: #fee2e2; color: #991b1b; }
    .empty-state { padding: 40px; text-align: center; color: #64748b; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #111827; color: white; padding: 14px 24px; border-radius: 999px; box-shadow: 0 20px 44px rgba(15, 23, 42, 0.22); z-index: 1000; }
    @media (max-width: 860px) { .section { padding: 22px; } .topbar { flex-direction: column; align-items: stretch; } .stats-grid { grid-template-columns: 1fr; } .filter-row { grid-template-columns: 1fr; } table { min-width: 100%; } }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <h1>📋 Rekodi za Maji</h1>
        <p>Chunguza, filtra, na usimamia ankara zilizohifadhiwa kwa mfumo wa kisasa wa billar.</p>
      </div>
      <nav class="nav-links">
        <a class="nav-btn" href="/">Nyumbani</a>
        <a class="nav-btn" href="/login">Login</a>
        <a class="nav-btn" href="/dashboard">Dashboard</a>
      </nav>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="label">Rekodi zilizohifadhiwa</span>
        <span class="value" id="recordCount">0</span>
      </div>
      <div class="stat-card">
        <span class="label">Mapato yote</span>
        <span class="value" id="recordRevenue">TZS 0</span>
      </div>
      <div class="stat-card">
        <span class="label">Bili za kulipwa</span>
        <span class="value" id="recordPending">0</span>
      </div>
    </div>

    <section class="section">
      <div class="section-header">
        <h2>Unda ankara mpya</h2>
        <button class="button secondary" type="button" onclick="resetForm()">Weka upya fomu</button>
      </div>
      <form id="recordForm">
        <div class="form-grid">
          <div class="field">
            <label for="customerName">Jina la mteja</label>
            <input id="customerName" type="text" placeholder="Jina la mteja" required>
          </div>
          <div class="field">
            <label for="phoneNumber">Namba ya simu</label>
            <input id="phoneNumber" type="tel" placeholder="0712345678" required>
          </div>
          <div class="field">
            <label for="previousReading">Usomaji wa nyuma</label>
            <input id="previousReading" type="number" min="0" value="0" required>
          </div>
          <div class="field">
            <label for="currentReading">Usomaji wa sasa</label>
            <input id="currentReading" type="number" min="0" value="0" required>
          </div>
          <div class="field">
            <label for="ratePerUnit">Gharama kwa unit (TZS)</label>
            <input id="ratePerUnit" type="number" min="0" value="2000" required>
          </div>
          <div class="field">
            <label for="paymentStatus">Hali ya malipo</label>
            <select id="paymentStatus">
              <option value="unpaid">Haijalipwa</option>
              <option value="paid">Imelipwa</option>
            </select>
          </div>
        </div>
        <button class="button primary" type="submit">Hifadhi rekodi</button>
      </form>
    </section>

    <section class="section">
      <div class="section-header">
        <h2>Rekodi zilizohifadhiwa</h2>
        <div class="filter-row">
          <input id="searchInput" type="text" placeholder="Tafuta kwa jina au namba" oninput="renderRecords()">
          <button class="button primary" type="button" onclick="renderRecords()">Tafuta</button>
        </div>
      </div>
      <div id="recordsContainer"></div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = 'water_bills_records';

    function getRecords() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch {
        return [];
      }
    }

    function persistRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      updateStats();
      renderRecords();
    }

    function updateStats() {
      const records = getRecords();
      const revenue = records.reduce((sum, item) => sum + item.total, 0);
      const pending = records.filter(item => item.status === 'unpaid').length;
      document.getElementById('recordCount').textContent = records.length;
      document.getElementById('recordRevenue').textContent = `TZS ${revenue.toLocaleString()}`;
      document.getElementById('recordPending').textContent = pending;
    }

    function resetForm() {
      document.getElementById('recordForm').reset();
      document.getElementById('ratePerUnit').value = 2000;
    }

    function saveRecord(event) {
      event.preventDefault();
      const name = document.getElementById('customerName').value.trim();
      const phone = document.getElementById('phoneNumber').value.trim();
      const previousReading = Number(document.getElementById('previousReading').value);
      const currentReading = Number(document.getElementById('currentReading').value);
      const ratePerUnit = Number(document.getElementById('ratePerUnit').value);
      const status = document.getElementById('paymentStatus').value;

      if (!name || !phone) {
        return showToast('Jina na namba ya simu vinahitajika');
      }
      if (currentReading < previousReading) {
        return showToast('Usomaji wa sasa lazima uwe sawa au mkubwa kuliko usomaji wa nyuma');
      }

      const units = currentReading - previousReading;
      const total = units * ratePerUnit;
      const record = {
        id: Date.now().toString(),
        name,
        phone,
        previousReading,
        currentReading,
        units,
        ratePerUnit,
        total,
        status,
        createdAt: new Date().toISOString()
      };

      persistRecords([record, ...getRecords()]);
      resetForm();
      showToast('Rekodi imehifadhiwa kwa mafanikio');
    }

    function removeRecord(recordId) {
      const records = getRecords().filter(record => record.id !== recordId);
      persistRecords(records);
      showToast('Rekodi imeondolewa');
    }

    function renderRecords() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      let records = getRecords();
      if (query) {
        records = records.filter(record => record.name.toLowerCase().includes(query) || record.phone.includes(query));
      }
      const container = document.getElementById('recordsContainer');
      if (!records.length) {
        container.innerHTML = '<div class="empty-state"><strong>Hakuna rekodi</strong><p>Hifadhi ankara mpya ili kuzipata hapa.</p></div>';
        return;
      }
      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Mteja</th>
              <th>Simu</th>
              <th>Units</th>
              <th>Bili</th>
              <th>Status</th>
              <th>Vitendo</th>
            </tr>
          </thead>
          <tbody>
            ${records.map(record => `
              <tr>
                <td>${escapeHtml(record.name)}</td>
                <td>${escapeHtml(record.phone)}</td>
                <td>${record.units} U</td>
                <td>TZS ${record.total.toLocaleString()}</td>
                <td><span class="badge ${record.status === 'paid' ? 'paid' : 'unpaid'}">${record.status === 'paid' ? 'Imelipwa' : 'Haijalipwa'}</span></td>
                <td><button class="button secondary" type="button" onclick="removeRecord('${record.id}')">Futa</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function showToast(message) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2800);
    }

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value;
      return div.innerHTML;
    }

    document.getElementById('recordForm').addEventListener('submit', saveRecord);
    updateStats();
    renderRecords();
  </script>
</body>
</html>
