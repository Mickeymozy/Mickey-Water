<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Water Billing</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, sans-serif;
      color: #e2e8f0;
      background: #0b1223;
      accent-color: #38bdf8;
      --warning: #f59e0b;
      --success: #22c55e;
      --error: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #09101f 0%, #0b1223 100%);
      color: #e2e8f0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 20px 24px;
      background: rgba(15, 23, 42, 0.98);
      border-bottom: 1px solid rgba(148, 163, 184, 0.14);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 800;
      font-size: 1.1rem;
    }

    #connectionStatus {
      font-size: 0.85rem;
      font-weight: normal;
      padding: 4px 10px;
      border-radius: 20px;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    nav a,
    button {
      border: none;
      border-radius: 14px;
      padding: 10px 16px;
      background: rgba(56, 189, 248, 0.14);
      color: #e2e8f0;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    nav a:hover,
    button:hover {
      transform: translateY(-1px);
      background: rgba(56, 189, 248, 0.24);
    }

    main {
      max-width: 1120px;
      margin: 24px auto;
      padding: 0 24px 40px;
      display: grid;
      gap: 24px;
    }

    .card {
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 55px rgba(0, 0, 0, 0.22);
    }

    .card h1,
    .card h2 {
      margin: 0 0 14px;
      font-weight: 700;
      color: #ffffff;
    }

    .card p {
      margin: 0;
      color: #94a3b8;
      line-height: 1.75;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .metric {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .metric span {
      display: block;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .metric strong {
      display: block;
      margin-top: 12px;
      font-size: 2rem;
      color: #ffffff;
    }

    .form-group {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    label {
      font-size: 0.95rem;
      color: #cbd5e1;
      font-weight: 600;
    }

    input,
    textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: #090f1f;
      color: #e2e8f0;
      font: inherit;
      resize: vertical;
    }

    textarea { min-height: 120px; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    .actions button {
      min-width: 160px;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
    }

    .message {
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(56, 189, 248, 0.12);
      color: #cbe7ff;
      border: 1px solid transparent;
    }

    .message.error {
      background: rgba(248, 113, 113, 0.15);
      color: #fca5a5;
      border-color: rgba(248, 113, 113, 0.3);
    }

    .message.success {
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
      border-color: rgba(34, 197, 94, 0.3);
    }

    footer {
      text-align: center;
      color: #94a3b8;
      font-size: 0.95rem;
      margin-top: 20px;
    }

    /* Mfumo wa Access Denied Visuals */
    .denied-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 20px;
    }
    .denied-card {
      background: rgba(30, 41, 59, 0.7);
      border: 2px solid var(--error);
      padding: 40px;
      border-radius: 24px;
      max-width: 500px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    @media (max-width: 720px) {
      header { flex-direction: column; align-items: flex-start; }
      nav { width: 100%; justify-content: flex-start; }
    }
  </style>

  <script>
    // Kikao cha usalama (Access Control) - Kinaanza kabla ya page kufunguka kabisa
    (function checkAdminAccess() {
      const userString = localStorage.getItem('user');
      const adminEmail = 'mickidadyhamza@gmail.com';
      let accessGranted = false;

      if (userString) {
        try {
          const user = JSON.parse(userString);
          if (user && user.email === adminEmail) {
            accessGranted = true;
          }
        } catch (e) {
          console.error("Error parsing user data from localStorage", e);
        }
      }

      // Kama sio admin, badilisha HTML nzima kuonyesha Access Denied
      if (!accessGranted) {
        window.stop(); // Inasimamisha upakiaji wa bando lolote lililobaki
        document.documentElement.innerHTML = `
          <head>
            <title>403 - Access Denied</title>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <style>
              body { background: #0b1223; color: #e2e8f0; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
              .denied-card { background: rgba(15, 23, 42, 0.95); border: 1px solid #ef4444; border-radius: 24px; padding: 40px; text-align: center; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
              h1 { color: #ef4444; margin-top: 0; font-size: 2rem; }
              p { color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
              a { display: inline-block; background: #2563eb; color: white; padding: 12px 24px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: background 0.2s; }
              a:hover { background: #1d4ed8; }
            </style>
          </head>
          <body>
            <div class="denied-card">
              <div style="font-size: 50px; margin-bottom: 10px;">🚫</div>
              <h1>Access Denied</h1>
              <p>Huna ruhusa ya kuingia kwenye ukurasa huu. Ukurasa huu ni maalum kwa ajili ya Msimamizi Mkuu (Admin) tu.</p>
              <a href="login.html">Sign In kama Admin</a>
            </div>
          </body>
        `;
      }
    })();
  </script>
</head>
<body>
  <header>
    <div class="brand">
      Admin Panel 
      <span id="connectionStatus">Checking...</span>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="botweb.html">Dashboard</a>
      <a href="records.html">Records</a>
      <a href="login.html">Login</a>
    </nav>
    <button onclick="logout()">Logout</button>
  </header>

  <main>
    <section class="card">
      <h1>System summary</h1>
      <p>Quick overview of user and record counts with a simple notification sender.</p>
      <div class="stats">
        <div class="metric"><span>Total users</span><strong id="usersCount">-</strong></div>
        <div class="metric"><span>Total records</span><strong id="recordsCount">-</strong></div>
        <div class="metric"><span>Pending resets</span><strong id="resetCount">-</strong></div>
      </div>
      <div class="actions">
        <button class="btn-primary" onclick="refreshStats()">Refresh stats</button>
        <button class="btn-secondary" onclick="window.location.href='records.html'">Open records</button>
      </div>
      <div id="statusMessage" class="message" style="display:none;"></div>
    </section>

    <section class="card">
      <h2>Send notification</h2>
      <form id="notificationForm">
        <div class="form-group">
          <label for="notificationTitle">Title</label>
          <input id="notificationTitle" type="text" placeholder="Maintenance starts at 10 PM" required maxlength="80">
        </div>
        <div class="form-group">
          <label for="notificationBody">Message</label>
          <textarea id="notificationBody" placeholder="Your panel will be unavailable for a short time." required maxlength="200"></textarea>
        </div>
        <div class="form-group">
          <label for="notificationUrl">Link (optional)</label>
          <input id="notificationUrl" type="url" placeholder="/botweb.html">
        </div>
        <div class="actions">
          <button class="btn-primary" type="submit" id="sendBtn">Send notification</button>
          <button class="btn-secondary" type="button" onclick="showStatus('Use the form to broadcast an announcement to clients.', 'success')">Help</button>
        </div>
      </form>
    </section>
  </main>

  <footer>© 2026 Water Billing. Admin access only.</footer>

  <script>
    const STATS_URL = '/api/admin/stats';
    const NOTIFY_URL = '/api/admin/notify';

    function setStatusIndicator(offline) {
      const statusSpan = document.getElementById('connectionStatus');
      if (offline) {
        statusSpan.innerText = '⚠️ Offline Mode';
        statusSpan.style.background = 'rgba(245, 158, 11, 0.2)';
        statusSpan.style.color = 'var(--warning)';
      } else {
        statusSpan.innerText = '🟢 Server Connected';
        statusSpan.style.background = 'rgba(34, 197, 94, 0.2)';
        statusSpan.style.color = 'var(--success)';
      }
    }

    // Inapata takwimu kutoka kwenye Server (Mongoose/MongoDB)
    async function refreshStats() {
      showStatus('Loading system data...', 'success');

      try {
        const response = await fetch(STATS_URL, { credentials: 'same-origin' });
        
        // Kama server imekataa kwa sababu ya ulinzi (mfano 401 au 403)
        if (response.status === 401 || response.status === 403) {
            showStatus('❌ Unauthorized server access! Redirecting...', 'error');
            setTimeout(() => logout(), 2000);
            return;
        }

        if (!response.ok) throw new Error('Server returned an error');
        const data = await response.json();

        document.getElementById('usersCount').innerText = data.totalUsers || '0'; 
        document.getElementById('recordsCount').innerText = data.totalRecords || '0';
        document.getElementById('resetCount').innerText = data.pendingResets || '0';

        setStatusIndicator(false);
        showStatus('Stats synchronized with MongoDB successfully.', 'success');
      } catch (error) {
        console.warn('Haikuweza kuunganishwa na server. Tunatafuta data kwenye LocalStorage...', error);
        setStatusIndicator(true);

        const localData = localStorage.getItem('water_records');
        const records = localData ? JSON.parse(localData) : [];

        document.getElementById('usersCount').innerText = '1 (Local Admin)';
        document.getElementById('recordsCount').innerText = records.length;
        document.getElementById('resetCount').innerText = '0 (Offline)';

        showStatus('⚠️ Displaying offline cached data from LocalStorage.', 'error');
      }
    }

    // Kutuma Notifications kwenda backend
    document.getElementById('notificationForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const title = document.getElementById('notificationTitle').value;
      const body = document.getElementById('notificationBody').value;
      const url = document.getElementById('notificationUrl').value;
      const sendBtn = document.getElementById('sendBtn');

      const payload = { title, body, url, timestamp: new Date().toISOString() };

      sendBtn.disabled = true;
      sendBtn.innerText = 'Sending...';

      try {
        const response = await fetch(NOTIFY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          credentials: 'same-origin'
        });

        if (response.status === 401 || response.status === 403) {
            showStatus('❌ You do not have permission to broadcast.', 'error');
            return;
        }

        if (response.ok) {
          showStatus('🚀 Notification broadcasted successfully via server!', 'success');
          document.getElementById('notificationForm').reset();
        } else {
          throw new Error('Server failed to broadcast');
        }
      } catch (error) {
        console.error('Notification error:', error);

        const localAnnouncements = localStorage.getItem('local_notifications') ? JSON.parse(localStorage.getItem('local_notifications')) : [];
        localAnnouncements.push(payload);
        localStorage.setItem('local_notifications', JSON.stringify(localAnnouncements));

        showStatus('⚠️ Server offline! Notification saved locally as draft.', 'error');
      } finally {
        sendBtn.disabled = false;
        sendBtn.innerText = 'Send notification';
      }
    });

    function showStatus(text, type = 'success') {
      const msgDiv = document.getElementById('statusMessage');
      msgDiv.innerText = text;
      msgDiv.className = `message ${type}`;
      msgDiv.style.display = 'block';

      setTimeout(() => {
        msgDiv.style.display = 'none';
      }, 5000);
    }

    async function logout() {
      localStorage.removeItem('authToken');
      localStorage.removeItem('user');
      localStorage.removeItem('loginTime');
      try {
        await fetch('/api/logout', { method: 'POST', credentials: 'same-origin' });
        window.location.href = 'login.html';
      } catch(err) {
        window.location.href = 'login.html';
      }
    }

    window.onload = refreshStats;
  </script>
</body>
</html>
