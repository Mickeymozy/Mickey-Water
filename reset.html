<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Billing | Reset Password</title>
  <style>
    :root{--bg:#07111f;--surface:rgba(15,23,42,0.96);--border:rgba(148,163,184,0.18);--text:#eff6ff;--muted:#cbd5e1;--primary:#38bdf8;--accent:#2563eb;--success:#22c55e;--error:#f87171;}
    *{box-sizing:border-box;font-family:Segoe UI, Arial, sans-serif;}
    body{margin:0;min-height:100vh;background:linear-gradient(135deg,#020617,#0f172a 35%,#1e293b 100%);color:var(--text);display:grid;place-items:center;padding:24px;}
    .card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:24px;box-shadow:0 18px 40px rgba(8,15,30,0.45);} 
    h1{margin:0 0 8px;font-size:1.7rem;} p{color:var(--muted);line-height:1.4;} 
    .field{display:grid;gap:6px;margin-top:14px;} .field input{background:rgba(15,23,42,0.95);border:1px solid var(--border);border-radius:12px;padding:11px 12px;color:var(--text);font-size:1rem;} .field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(56,189,248,0.12);} 
    .btn{display:block;width:100%;border:none;border-radius:12px;padding:12px 14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;}
    .message{display:none;margin-top:12px;padding:10px 12px;border-radius:12px;font-weight:600;} .message.error{display:block;background:rgba(248,113,113,0.12);color:#fecaca;border:1px solid rgba(248,113,113,0.25);} .message.success{display:block;background:rgba(34,197,94,0.12);color:#bbf7d0;border:1px solid rgba(34,197,94,0.25);} 
  </style>
</head>
<body>
  <main class="card">
    <h1>Reset password</h1>
    <p>Use the token from your email to create a new password.</p>
    <div class="field"><label for="email">Email</label><input id="email" type="email" required></div>
    <div class="field"><label for="token">Reset token</label><input id="token" type="text" required></div>
    <div class="field"><label for="password">New password</label><input id="password" type="password" required minlength="6"></div>
    <div class="field"><button id="saveBtn" class="btn" type="button" onclick="saveReset()">Update password</button></div>
    <div id="msg" class="message"></div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const emailInput = document.getElementById('email');
    const tokenInput = document.getElementById('token');
    if (params.get('email')) emailInput.value = decodeURIComponent(params.get('email'));
    if (params.get('token')) tokenInput.value = params.get('token');

    async function saveReset() {
      const email = emailInput.value.trim();
      const token = tokenInput.value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('saveBtn');
      try {
        btn.disabled = true;
        btn.textContent = 'Saving...';
        const response = await fetch('/api/password-reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token, password })
        });
        const data = await response.json();
        msg.className = 'message ' + (response.ok ? 'success' : 'error');
        msg.textContent = data.message || data.error || 'Done';
        if (response.ok) setTimeout(() => window.location.href = '/login.html', 900);
      } catch (err) {
        msg.className = 'message error';
        msg.textContent = 'Unable to update password.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update password';
      }
    }
  </script>
</body>
</html>
