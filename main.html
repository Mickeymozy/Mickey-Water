<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0b1223; color:#e2e8f0; font-family:system-ui, sans-serif; text-align:center; padding:24px; }
    .panel { max-width:620px; width:100%; padding:28px; border-radius:20px; background:rgba(15,23,42,.95); border:1px solid rgba(148,163,184,.18); }
    h1 { margin-bottom:14px; font-size:2rem; }
    p { color:#94a3b8; line-height:1.75; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Loading dashboard…</h1>
    <p>If you are signed in, you will be redirected to your dashboard shortly.</p>
  </div>
  <script>
    fetch('/api/me', { credentials: 'same-origin' })
      .then((res) => {
        if (res.ok) return window.location.href = '/botweb.html';
        window.location.href = '/login.html';
      })
      .catch(() => window.location.href = '/login.html');
  </script>
</body>
</html>
