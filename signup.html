<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Billing System - Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #e2e8f0;
        }
        .container {
            background: #111827;
            border: 1px solid #334155;
            border-radius: 20px;
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .header {
            background: rgba(30, 41, 59, 0.5);
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        .content { padding: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #94a3b8; }
        input {
            width: 100%; padding: 12px; border-radius: 10px;
            background: #090f1f; border: 1px solid #334155;
            color: white; font-size: 1em;
        }
        button {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            font-weight: bold; font-size: 1em; cursor: pointer; margin-top: 10px;
            background: #22c55e; color: white;
        }
        .message { padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 0.9em; text-align: center; }
        .error { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid #ef4444; display: block; }
        .success { background: rgba(34, 197, 94, 0.2); color: #86efac; border: 1px solid #22c55e; display: block; }
        .footer-link { text-align: center; margin-top: 20px; font-size: 0.9em; color: #94a3b8; }
        .footer-link a { color: #38bdf8; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📝 Register Account</h2>
            <p style="color:#94a3b8; font-size:0.85em;">Create account for Water Billing Access</p>
        </div>
        <div class="content">
            <div id="msg" class="message"></div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit">Create Account</button>
            </form>

            <div class="footer-link">
                Already registered? <a href="/login">Login here</a>
            </div>
        </div>
    </div>

    <script>
        const msg = document.getElementById('msg');

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.style.display = 'none';

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await response.json();

                if (data.success) {
                    msg.className = 'message success';
                    msg.textContent = 'Account created successfully! Redirecting to login...';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    msg.className = 'message error';
                    msg.textContent = data.error || 'Registration failed';
                }
            } catch (err) {
                msg.className = 'message error';
                msg.textContent = 'Network or server error';
            }
        });
    </script>
</body>
</html>
