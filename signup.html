<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign Up — Bot Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300,400,600,700&display=swap" rel="stylesheet">
  <style>
    :root{--bg-1:#1e3a8a;--bg-2:#2563eb;--bg-3:#06b6d4;--card-bg:rgba(255,255,255,0.98);--accent-1:#2563eb;--accent-2:#06b6d4;--muted:#475569;--text-primary:#0f172a;--success:#059669;--error:#dc2626}
    *{box-sizing:border-box}
    body{font-family:'Poppins','Segoe UI',system-ui,Arial;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg-1) 0%,var(--bg-2) 50%,var(--bg-3) 100%);padding:24px;letter-spacing:0.3px;overflow:hidden;position:relative}
    .video-shell{position:fixed;inset:0;z-index:-2;overflow:hidden;background:#020617}
    .video-shell iframe{width:100vw;height:100vh;border:0;pointer-events:none;transform:scale(1.05);filter:brightness(0.45) saturate(1.08)}
    .video-overlay{position:absolute;inset:0;background:linear-gradient(135deg, rgba(15,23,42,0.78), rgba(15,23,42,0.6));z-index:-1}
    .card{background:var(--card-bg);padding:22px;border-radius:16px;max-width:480px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,0.12);border:1px solid rgba(255,255,255,0.3)}
    h1{margin:0 0 8px 0;color:var(--text-primary);font-weight:800;font-size:1.5rem}
    p{margin:0 0 14px 0;color:var(--muted);font-weight:500}
    .row{margin-bottom:12px}
    input{width:100%;padding:11px;border-radius:10px;border:2px solid #cbd5e1;font-family:Poppins,sans-serif;font-size:0.95rem;color:var(--text-primary);transition:all 0.3s;font-weight:500}
    input:focus{outline:none;border-color:var(--accent-2);box-shadow:0 0 0 4px rgba(6,182,212,0.1);background:#f0f9ff}
    button.primary{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent-1),var(--accent-2));color:#fff;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:0.4px;font-size:0.9rem;transition:all 0.3s}
    button.primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,0.3)}

    /* Google Button Style */
    .btn-google{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent-1),var(--accent-2));color:#fff;font-weight:800;cursor:pointer;width:100%;text-decoration:none;margin-bottom:16px;letter-spacing:0.4px;transition:all 0.3s}
    .btn-google:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,0.3)}
    .btn-google img{height:20px}

    .or{display:flex;align-items:center;gap:12px;margin:16px 0}
    .or div{flex:1;height:1px;background:#e2e8f0}
    .or span{font-size:12px;color:var(--muted);font-weight:600}

    .small{font-size:0.9rem;color:var(--muted);margin-top:12px;text-align:center;font-weight:500}
    a{color:var(--accent-1);text-decoration:none;font-weight:700;transition:all 0.3s}
    a:hover{color:var(--accent-2)}

    /* Notification styles */
    #notify { position: fixed; right: 16px; top: 16px; z-index: 9999; pointer-events: none; }
    #notify .note { pointer-events: auto; min-width:220px; max-width:420px; padding:14px 16px; border-radius:12px; color:#fff; box-shadow:0 12px 30px rgba(0,0,0,0.2); transform-origin:center; transform: perspective(600px) translateZ(0) rotateX(0); opacity:0; transition: transform 260ms cubic-bezier(.2,.9,.2,1), opacity 260ms; margin-top:10px; font-weight:700 }
    #notify .note.show { opacity:1; transform: perspective(600px) translateZ(18px) rotateX(0deg) }
    #notify .note.info { background: linear-gradient(135deg,#2563eb,#06b6d4) }
    #notify .note.success { background: linear-gradient(135deg,#059669,#047857) }
    #notify .note.error { background: linear-gradient(135deg,#dc2626,#b91c1c) }

    @media (max-width:480px){ .card{padding:16px;margin:12px} body{padding:12px} }
  </style>
</head>
<body>
  <div class="video-shell" aria-hidden="true">
    <iframe src="https://www.youtube.com/embed/U9N2h3GY7jU?autoplay=1&mute=1&controls=0&loop=1&playlist=U9N2h3GY7jU&rel=0&showinfo=0" allow="autoplay; encrypted-media"></iframe>
    <div class="video-overlay"></div>
  </div>

  <div class="card">
    <h1>Create your panel account</h1>
    <p class="small" style="text-align:left">Sign up to manage your bot hosting panel and server pairs.</p>

    <a href="/auth/google" class="btn-google">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G"> 
      Sign up with Google
    </a>

    <div class="or"><div></div><span>or use email</span><div></div></div>

    <form id="signupForm">
      <div class="row"><input type="text" id="name" placeholder="Full name" required></div>
      <div class="row"><input type="email" id="email" placeholder="Email address" required></div>
      <div class="row"><input type="tel" id="phone" placeholder="Phone (optional)" pattern="[0-9+\- ]{7,}" ></div>
      <div class="row"><input type="password" id="password" placeholder="Password" required></div>
      <button type="submit" class="primary">Create account</button>
    </form>

    <div class="small">Already have an account? <a href="login.html">Sign in</a></div>
    <div class="small"><a href="index.html" style="color:var(--muted);font-weight:400">Return to home</a></div>
  </div>

  <div id="notify" aria-hidden="true"></div>

  <script>
    function showNotification(message, type = 'info', duration = 3000) {
      let container = document.getElementById('notify');
      const el = document.createElement('div'); el.className = 'note ' + type; el.innerHTML = '<div style="font-weight:700">' + message + '</div>';
      container.appendChild(el);
      requestAnimationFrame(() => el.classList.add('show'));
      setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, duration);
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;

      try{
        const resp = await fetch('/signup', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, password })
        });
        const data = await resp.json();
        if (!resp.ok) {
          showNotification(data.error || 'Sign up failed', 'error', 3500);
          return;
        }

        if (data.user) {
          localStorage.setItem('authToken', 'session_' + Date.now());
          localStorage.setItem('user', JSON.stringify({
            userId: data.user.id,
            email: data.user.email,
            name: data.user.name,
            picture: ''
          }));
          localStorage.setItem('loginTime', new Date().toISOString());
        }

        showNotification('Account created successfully! Redirecting...', 'success', 1400);
        setTimeout(() => {
          const adminEmails = ['mickidadyhamza@gmail.com'];
          const isAdmin = adminEmails.includes(data.user.email);
          window.location.href = isAdmin ? '/admin.html' : '/botweb.html';
        }, 900);
      } catch (err) {
        console.error('Error:', err);
        showNotification('Network error — please try again', 'error', 3000);
      }
    });
  </script>
</body>
</html>
