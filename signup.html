<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Mickey Water</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: 'Inter', sans-serif; background: #0f172a; color: #fff; }
    .site-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; max-width: 1180px; margin: 0 auto; }
    .site-brand { font-size: 1.2rem; font-weight: 800; letter-spacing: 0.06em; }
    .site-nav { display: flex; gap: 16px; flex-wrap: wrap; }
    .site-nav a { color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    .page-shell { display: grid; place-items: center; min-height: calc(100vh - 88px); padding: 20px; }
    .auth-card { width: min(550px, 100%); background: #ffffff; border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); color: #0f172a; }
    .auth-card h1 { font-size: 1.8rem; margin-bottom: 8px; font-weight: 800; }
    .auth-card p { margin-bottom: 24px; color: #475569; font-size: 0.95rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; margin-bottom: 6px; font-weight: 600; color: #1e293b; font-size: 0.85rem; }
    .field input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 0.95rem; }
    .button { width: 100%; padding: 14px; border-radius: 12px; border: none; color: white; background: #059669; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 10px; }
    .links { margin-top: 20px; text-align: center; font-size: 0.9rem; }
    .links a { color: #2563eb; text-decoration: none; font-weight: 700; }
    @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-brand">💧 Mickey Water</div>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="records.html">Records</a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="auth-card">
      <h1>Create account</h1>
      <p>Jisajili leo ili kuanza kusimamia ankara zako za maji.</p>
      <form id="signupForm">
        <div class="form-grid">
          <div class="field"><label for="fullname">Full name</label><input id="fullname" type="text" placeholder="John Doe" required></div>
          <div class="field"><label for="email">Email</label><input id="email" type="email" placeholder="you@example.com" required></div>
          <div class="field"><label for="phone">Phone</label><input id="phone" type="tel" placeholder="0712345678" required></div>
          <div class="field"><label for="account">Account #</label><input id="account" type="text" placeholder="ACC-123" required></div>
          <div class="field"><label for="password">Password</label><input id="password" type="password" placeholder="••••••••" required></div>
          <div class="field"><label for="confirmPassword">Confirm</label><input id="confirmPassword" type="password" placeholder="••••••••" required></div>
        </div>
        <button class="button" type="submit">Create account</button>
      </form>
      <div class="links">
        <a href="login.html">Already have an account?</a>
      </div>
    </section>
  </main>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const fullname = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const account_number = document.getElementById('account').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) return alert('Passwords do not match');
      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullname, email, phone, account_number, password })
        });
        const result = await response.json();
        if (!response.ok) return alert(result.error || 'Signup failed. Please try again.');
        alert(result.message || 'Account created successfully');
        window.location.href = 'login.html';
      } catch (error) {
        alert('Imeshindwa kuunganisha kwenye seva. Tafadhali jaribu tena baadae.');
      }
    });
  </script>
</body>
</html>
