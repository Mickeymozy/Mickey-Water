<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Billing | Sign Up</title>
  <style>
    :root{--bg:#07111f;--surface:rgba(15,23,42,0.96);--border:rgba(148,163,184,0.18);--text:#eff6ff;--muted:#cbd5e1;--primary:#38bdf8;--accent:#2563eb;--success:#22c55e;--error:#f87171;}
    *{box-sizing:border-box;font-family:Segoe UI, Arial, sans-serif;}
    body{margin:0;min-height:100vh;background:linear-gradient(135deg,#020617,#0f172a 35%,#1e293b 100%);color:var(--text);display:grid;place-items:center;padding:24px;}
    .card{width:100%;max-width:460px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:24px;box-shadow:0 18px 40px rgba(8,15,30,0.45);}
    h1{margin:0 0 8px;font-size:1.7rem;}
    p{color:var(--muted);line-height:1.4;}
    .btn{display:block;width:100%;border:none;border-radius:12px;padding:12px 14px;font-weight:700;cursor:pointer;transition:.18s;}
    .btn:hover{transform:translateY(-1px);} 
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;}
    .btn-google{background:#fff;color:#111827;border:1px solid #dbe4ee;display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;}
    .field{display:grid;gap:6px;margin-top:12px;}
    .field label{font-size:.92rem;color:var(--muted);font-weight:600;}
    .field input{background:rgba(15,23,42,0.95);border:1px solid var(--border);border-radius:12px;padding:11px 12px;color:var(--text);font-size:1rem;}
    .field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(56,189,248,0.12);} 
    .message{display:none;margin-top:12px;padding:10px 12px;border-radius:12px;font-weight:600;}
    .message.error{display:block;background:rgba(248,113,113,0.12);color:#fecaca;border:1px solid rgba(248,113,113,0.25);} 
    .message.success{display:block;background:rgba(34,197,94,0.12);color:#bbf7d0;border:1px solid rgba(34,197,94,0.25);} 
    .small{font-size:.95rem;color:var(--muted);margin-top:10px;text-align:center;}
    .link{color:var(--primary);text-decoration:none;font-weight:700;}
  </style>
</head>
<body>
  <main class="card">
    <h1>Create your Water Billing account</h1>
    <p>Register with email, or sign up with Google and start managing records in MongoDB.</p>

    <a class="btn btn-google" href="/auth/google">G Continue with Google</a>

    <form id="signupForm">
      <div class="field"><label for="name">Full name</label><input id="name" type="text" required placeholder="Your name"></div>
      <div class="field"><label for="email">Email</label><input id="email" type="email" required placeholder="you@example.com"></div>
      <div class="field"><label for="phone">Phone (optional)</label><input id="phone" type="tel" placeholder="0712345678"></div>
      <div class="field"><label for="password">Password</label><input id="password" type="password" required placeholder="Minimum 6 characters"></div>
      <div class="field"><button id="signupBtn" class="btn btn-primary" type="submit">Create account</button></div>
    </form>

    <div id="msg" class="message"></div>
    <div class="small">Already have an account? <a class="link" href="login.html">Sign in</a></div>
    <div class="small"><a class="link" href="index.html">Back to home</a></div>
  </main>

  <script>
    const msg = document.getElementById('msg');
    function showMsg(text, type='error') { msg.className='message ' + type; msg.textContent=text; }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('signupBtn');

      try {
        btn.disabled = true;
        btn.textContent = 'Creating account...';
        const response = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ name, email, phone, password })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Signup failed');

        localStorage.setItem('authToken', 'session_' + Date.now());
        localStorage.setItem('user', JSON.stringify(data.user));
        localStorage.setItem('loginTime', new Date().toISOString());

        showMsg('Account created successfully. Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = data.user.role === 'admin' ? '/admin.html' : '/records.html';
        }, 800);
      } catch (err) {
        showMsg(err.message || 'Unable to create account', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
