<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Mickey Water</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { min-height:100vh; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f8fafc; color:#0f172a; }
    .shell { max-width:1140px; margin:0 auto; padding:28px; }
    header { display:flex; justify-content:space-between; flex-wrap:wrap; gap:18px; align-items:center; margin-bottom:28px; }
    header h1 { font-size:2rem; }
    header .actions { display:flex; gap:12px; flex-wrap:wrap; }
    .button { display:inline-flex; align-items:center; justify-content:center; gap:10px; border:none; border-radius:16px; padding:12px 18px; cursor:pointer; font-weight:700; }
    .button.primary { background:#2563eb; color:white; }
    .button.secondary { background:#e2e8f0; color:#0f172a; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:20px; margin-bottom:30px; }
    .card { background:white; border-radius:24px; padding:24px; box-shadow:0 25px 60px rgba(15,23,42,0.08); }
    .card h2 { font-size:1rem; color:#64748b; margin-bottom:14px; }
    .card strong { display:block; font-size:2rem; color:#0f172a; }
    table { width:100%; border-collapse:collapse; background:white; border-radius:24px; overflow:hidden; box-shadow:0 25px 60px rgba(15,23,42,0.08); }
    th, td { padding:16px 18px; text-align:left; border-bottom:1px solid #e2e8f0; }
    th { background:#f8fafc; color:#475569; font-size:0.95rem; }
    tr:last-child td { border-bottom:none; }
    .status { display:inline-flex; align-items:center; padding:8px 12px; border-radius:999px; font-size:0.8rem; font-weight:700; }
    .status.paid { background:#d1fae5; color:#047857; }
    .status.pending { background:#fef9c3; color:#92400e; }
    .empty { padding:32px; text-align:center; color:#64748b; }
    @media(max-width:720px){ header{flex-direction:column;align-items:flex-start;} }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>Customer Dashboard</h1>
        <p id="welcomeText" style="color:#475569; margin-top:8px;"></p>
      </div>
      <div class="actions">
        <button class="button secondary" onclick="logout()">Logout</button>
      </div>
    </header>

    <div class="grid">
      <div class="card"><h2>Total Bills</h2><strong id="billCount">0</strong></div>
      <div class="card"><h2>Total Paid</h2><strong id="totalPaid">TZS 0</strong></div>
      <div class="card"><h2>Outstanding</h2><strong id="outstanding">TZS 0</strong></div>
    </div>

    <section class="card" style="padding:0; overflow:hidden;">
      <table>
        <thead>
          <tr><th>Bill #</th><th>Month</th><th>Due</th><th>Paid</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="billsTable"></tbody>
      </table>
      <div id="emptyState" class="empty">Loading bills...</div>
    </section>
  </div>
  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!token || !user) return window.location.href = 'login.html';
    document.getElementById('welcomeText').textContent = `Welcome, ${user.fullname || user.email}`;

    async function loadBills() {
      try {
        const response = await fetch('/api/bills', { headers: { Authorization: `Bearer ${token}` } });
        if (!response.ok) throw new Error('Unauthorized');
        const bills = await response.json();
        const totalPaid = bills.reduce((sum, bill) => sum + bill.amount_paid, 0);
        const outstanding = bills.reduce((sum, bill) => sum + Math.max(0, bill.amount_due - bill.amount_paid), 0);
        document.getElementById('billCount').textContent = bills.length;
        document.getElementById('totalPaid').textContent = `TZS ${totalPaid.toLocaleString()}`;
        document.getElementById('outstanding').textContent = `TZS ${outstanding.toLocaleString()}`;
        renderBills(bills);
      } catch (error) {
        window.location.href = 'login.html';
      }
    }

    function renderBills(bills) {
      const tbody = document.getElementById('billsTable');
      const emptyState = document.getElementById('emptyState');
      if (!bills.length) {
        tbody.innerHTML = '';
        emptyState.textContent = 'No bills were found for your account.';
        return;
      }
      emptyState.style.display = 'none';
      tbody.innerHTML = bills.map(bill => {
        const date = new Date(bill.billing_month).toLocaleDateString();
        const statusClass = bill.status === 'paid' ? 'paid' : 'pending';
        return `<tr><td>${bill.bill_number}</td><td>${date}</td><td>TZS ${bill.amount_due.toLocaleString()}</td><td>TZS ${bill.amount_paid.toLocaleString()}</td><td><span class="status ${statusClass}">${bill.status.replace('_',' ')}</span></td><td><button class="button primary" style="font-size:0.85rem; padding:10px 14px;" onclick="openReceipt('${bill.id}')">Receipt</button></td></tr>`;
      }).join('');
    }

    function openReceipt(billId) {
      window.open(`/api/receipt/${billId}`, '_blank');
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    loadBills();
  </script>
</body>
</html>
