<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Mickey Water</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: 'Inter', sans-serif; background: #f1f5f9; color: #0f172a; }
    .site-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; padding: 24px; background: #ffffff; box-shadow: 0 10px 30px rgba(15,23,42,0.08); }
    .site-brand { font-size: 1.25rem; font-weight: 800; color: #2563eb; }
    .nav-links { display: flex; gap: 14px; flex-wrap: wrap; }
    .nav-links a, .nav-links button { text-decoration: none; color: #475569; font-weight: 700; background: transparent; border: none; cursor: pointer; padding: 8px 16px; border-radius: 10px; font-size: 0.9rem; transition: 0.2s; }
    .nav-links a:hover, .nav-links button:hover { background: #eef2ff; }
    .page-shell { max-width: 1180px; margin: 24px auto; padding: 0 24px 32px; }
    .hero { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 24px; align-items: center; margin-bottom: 28px; }
    .hero h1 { font-size: 1.8rem; font-weight: 800; }
    .hero p { color: #475569; line-height: 1.7; margin-top: 10px; }
    .button { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
    .button.primary { background: #2563eb; color: white; }
    .button.secondary { background: #fff; color: #0f172a; border: 1px solid #e2e8f0; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 25px 60px rgba(15,23,42,0.08); }
    .stat-card h2 { font-size: 1rem; color: #64748b; margin-bottom: 14px; }
    .stat-card strong { display: block; font-size: 2rem; color: #0f172a; }
    .content-card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 25px 60px rgba(15,23,42,0.08); }
    table { width: 100%; border-collapse: collapse; border-radius: 24px; overflow: hidden; }
    th, td { padding: 16px 18px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { background: #f8fafc; color: #475569; font-size: 0.95rem; }
    tr:hover td { background: #f8fafc; }
    .status { display: inline-flex; align-items: center; padding: 8px 12px; border-radius: 999px; font-size: 0.8rem; font-weight: 700; }
    .status.paid { background: #d1fae5; color: #047857; }
    .status.pending { background: #fef9c3; color: #92400e; }
    .empty { padding: 32px; text-align: center; color: #64748b; }
    @media (max-width: 760px) { .hero { flex-direction: column; } }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-brand">💧 Mickey Water</div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="records.html">Records</a>
      <button type="button" onclick="logout()">Logout</button>
    </nav>
  </header>

  <main class="page-shell">
    <section class="hero">
      <div class="hero-title">
        <h1>Customer Dashboard</h1>
        <p id="welcomeText">Loading account details...</p>
      </div>
      <button class="button secondary" onclick="logout()">Logout</button>
    </section>

    <section class="stats-grid">
      <div class="stat-card"><h2>Total Bills</h2><strong id="billCount">0</strong></div>
      <div class="stat-card"><h2>Total Paid</h2><strong id="totalPaid">TZS 0</strong></div>
      <div class="stat-card"><h2>Outstanding</h2><strong id="outstanding">TZS 0</strong></div>
    </section>

    <section class="content-card">
      <h2 style="margin-bottom:18px;">Recent Bills</h2>
      <table>
        <thead>
          <tr><th>Bill #</th><th>Month</th><th>Due</th><th>Paid</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="billsTable"></tbody>
      </table>
      <div id="emptyState" class="empty">Loading bills...</div>
    </section>
  </main>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!token || !user) return window.location.href = 'login.html';
    document.getElementById('welcomeText').textContent = `Karibu, ${user.fullname || user.email}`;

    async function loadBills() {
      try {
        const response = await fetch('/api/bills', { headers: { Authorization: `Bearer ${token}` } });
        if (!response.ok) throw new Error('Unauthorized');
        const bills = await response.json();
        const totalPaid = bills.reduce((sum, bill) => sum + bill.amount_paid, 0);
        const outstanding = bills.reduce((sum, bill) => sum + Math.max(0, bill.amount_due - bill.amount_paid), 0);
        document.getElementById('billCount').textContent = bills.length;
        document.getElementById('totalPaid').textContent = `TZS ${totalPaid.toLocaleString()}`;
        document.getElementById('outstanding').textContent = `TZS ${outstanding.toLocaleString()}`;
        renderBills(bills);
      } catch (error) {
        window.location.href = 'login.html';
      }
    }

    function renderBills(bills) {
      const tbody = document.getElementById('billsTable');
      const emptyState = document.getElementById('emptyState');
      if (!bills.length) {
        tbody.innerHTML = '';
        emptyState.textContent = 'No bills were found for your account.';
        return;
      }
      emptyState.style.display = 'none';
      tbody.innerHTML = bills.map(bill => {
        const date = new Date(bill.billing_month).toLocaleDateString();
        const statusClass = bill.status === 'paid' ? 'paid' : 'pending';
        return `<tr><td>${bill.bill_number}</td><td>${date}</td><td>TZS ${bill.amount_due.toLocaleString()}</td><td>TZS ${bill.amount_paid.toLocaleString()}</td><td><span class="status ${statusClass}">${bill.status.replace('_',' ')}</span></td><td><button class="button primary" style="font-size:0.85rem; padding:10px 14px;" onclick="openReceipt('${bill.id}')">Receipt</button></td></tr>`;
      }).join('');
    }

    function openReceipt(billId) {
      window.open(`/api/receipt/${billId}`, '_blank');
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    loadBills();
  </script>
</body>
</html>
