<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Billing System - Smart Gateway</title>
  <style>
    :root {
      --bg: #090d16;
      --surface: rgba(17, 24, 39, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --primary: #38bdf8;
      --primary-glow: rgba(56, 189, 248, 0.4);
      --accent: #6366f1;
      --success: #22c55e;
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--bg) 70%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Ambient Background Glows */
    .glow-orb {
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      background: var(--primary-glow);
      filter: blur(80px);
      z-index: -1;
      top: 10%;
      opacity: 0.6;
    }

    .container {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      margin-bottom: 25px;
    }

    .logo-icon {
      font-size: 3.5rem;
      display: inline-block;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--primary)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 15px var(--primary)); }
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    p.subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 30px;
    }

    /* Sync Status Box */
    .sync-card {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 35px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }

    .sync-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sync-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badge {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .badge.syncing {
      background: rgba(56, 189, 248, 0.15);
      color: var(--primary);
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .sync-info {
      font-size: 0.9rem;
      color: #e2e8f0;
      display: flex;
      justify-content: space-between;
    }

    .btn-sync {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-sync:hover {
      background: rgba(56, 189, 248, 0.1);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Action Buttons Navigation */
    .navigation-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .btn-nav {
      position: relative;
      padding: 16px 24px;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      border: 1px solid transparent;
    }

    .btn-login {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: #000;
      font-weight: 800;
      box-shadow: 0 4px 15px rgba(56, 189, 248, 0.25);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--primary-glow);
      filter: brightness(1.1);
    }

    .btn-admin {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-admin:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .footer-text {
      margin-top: 35px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* Rotation Utility for Sync */
    .rotate {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="glow-orb"></div>

  <div class="container">
    <div class="logo-area">
      <span class="logo-icon">🌊</span>
      <h1>H2O Billing Pro</h1>
      <p class="subtitle">Smart Management & Data Sync Gateway</p>
    </div>

    <div class="sync-card">
      <div class="sync-header">
        <div class="sync-title">
          <span>🔄 Storage Engine</span>
        </div>
        <span id="syncStatusBadge" class="badge">Synced</span>
      </div>
      <div class="sync-info">
        <div>Offline Queue: <strong id="offlineCount" style="color:var(--primary);">0 Items</strong></div>
        <button class="btn-sync" onclick="syncOfflineRecords()" id="syncBtn">
          <span id="syncIcon">⚡</span> Sync To Cloud
        </button>
      </div>
    </div>

    <div class="navigation-grid">
      <a href="/login" class="btn-nav btn-login">
        🔐 Open Customer & Staff Login
      </a>
      
      <a href="/admin" class="btn-nav btn-admin">
        🛠️ Direct Admin Dashboard
      </a>
    </div>

    <div class="footer-text">
      Water Billing Management System &copy; 2026 <br> Securely connected via Mongoose ODM
    </div>
  </div>

  <script>
    // Kazi ya Kuangalia na kusawazisha (Sync) data za LocalStorage kwenda MongoDB
    function checkOfflineQueue() {
      const localData = localStorage.getItem('water_records');
      const records = localData ? JSON.parse(localData) : [];
      const countEl = document.getElementById('offlineCount');
      const badge = document.getElementById('syncStatusBadge');

      countEl.innerText = `${records.length} Items`;

      if(records.length > 0) {
        badge.innerText = "Pending Cloud Sync";
        badge.className = "badge syncing";
        badge.style.color = "#f59e0b";
        badge.style.borderColor = "rgba(245, 158, 11, 0.2)";
        badge.style.background = "rgba(245, 158, 11, 0.15)";
      } else {
        badge.innerText = "Cloud Synced";
        badge.className = "badge";
        badge.style.color = "var(--success)";
        badge.style.borderColor = "rgba(34, 197, 94, 0.2)";
        badge.style.background = "rgba(34, 197, 94, 0.15)";
      }
    }

    async function syncOfflineRecords() {
      const localData = localStorage.getItem('water_records');
      const records = localData ? JSON.parse(localData) : [];
      const syncIcon = document.getElementById('syncIcon');
      const syncBtn = document.getElementById('syncBtn');

      if (records.length === 0) {
        alert("✨ Safi kabisa! Hakuna data za offline kwenye simu kwa sasa zote ziko MongoDB.");
        return;
      }

      // Anza urembo wa kuzungusha icon
      syncIcon.innerText = "🔄";
      syncIcon.classList.add('rotate');
      syncBtn.disabled = true;

      let successCount = 0;

      // Tuma kila rekodi iliyohifadhiwa kwenye simu kwenda kwenye server (MongoDB)
      for (const rec of records) {
        try {
          const response = await fetch('/api/records', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(rec)
          });
          if (response.ok) successCount++;
        } catch (err) {
          console.error("Kushindwa kusync rekodi:", err);
        }
      }

      // Kusafisha LocalStorage baada ya kufanikiwa kusync kila kitu
      if (successCount === records.length) {
        localStorage.removeItem('water_records');
        alert(`✅ Data zote (${successCount}) zimesawazishwa kikamilifu na MongoDB Cloud!`);
      } else if (successCount > 0) {
        const bado = records.length - successCount;
        const zilizobaki = records.slice(successCount);
        localStorage.setItem('water_records', JSON.stringify(zilizobaki));
        alert(`⚠️ Baadhi ya data (${successCount}) zimesync, lakini ${bado} zimefeli. Jaribu tena.`);
      } else {
        alert("❌ Server ipo offline au imekataa kupokea data. Jaribu baadae.");
      }

      // Zima urembo wa kuzungusha icon
      syncIcon.innerText = "⚡";
      syncIcon.classList.remove('rotate');
      syncBtn.disabled = false;
      checkOfflineQueue();
    }

    // Angalia kama kuna data simuni pindi tu ukurasa unapofunguka
    window.onload = checkOfflineQueue;
  </script>
</body>
</html>
