<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Billing</title>
  <style>
    :root {
      color-scheme: dark;
      color: #e2e8f0;
      background: #0f172a;
      accent-color: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .panel {
      width: min(680px, 100%);
      padding: 36px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.16);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 3vw, 2.7rem);
    }

    p {
      margin: 0 0 28px;
      line-height: 1.75;
      color: #94a3b8;
    }

    .buttons {
      display: grid;
      gap: 12px;
      margin: 0 auto;
      max-width: 420px;
    }

    .button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: 14px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .button-primary {
      background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
      color: white;
    }

    .button-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .button:hover {
      transform: translateY(-2px);
    }

    footer {
      margin-top: 32px;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    footer a {
      color: #38bdf8;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
    /* Code Viewer Styles */
    .code-viewer-section {
      width: min(1200px, 100%);
      margin-top: 40px;
      padding: 36px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.16);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
    }

    .code-viewer-section h2 {
      margin: 0 0 24px;
      font-size: 1.8rem;
      color: #e2e8f0;
    }

    .code-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .code-controls input {
      flex: 1;
      min-width: 200px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(10, 15, 35, 0.8);
      color: #e2e8f0;
      font-size: 0.95rem;
    }

    .code-controls input::placeholder {
      color: #64748b;
    }

    .code-controls button {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      background: rgba(56, 189, 248, 0.2);
      color: #e2e8f0;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .code-controls button:hover {
      background: rgba(56, 189, 248, 0.3);
      transform: translateY(-1px);
    }

    .logs-container {
      background: rgba(10, 15, 35, 0.9);
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.12);
      max-height: 600px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
    }

    .log-entry {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
      line-height: 1.6;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-header {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
    }

    .log-time {
      color: #64748b;
      font-weight: 600;
      min-width: 80px;
    }

    .log-type {
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      min-width: 60px;
      text-align: center;
    }

    .log-info .log-type {
      background: rgba(56, 189, 248, 0.2);
      color: #38bdf8;
    }

    .log-success .log-type {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .log-error .log-type {
      background: rgba(248, 113, 113, 0.2);
      color: #f87171;
    }

    .log-debug .log-type {
      background: rgba(168, 85, 247, 0.2);
      color: #d8b4fe;
    }

    .log-message {
      flex: 1;
      color: #cbd5e1;
      word-break: break-word;
    }

    .log-code {
      margin-top: 10px;
      background: rgba(0, 0, 0, 0.4);
      border-left: 3px solid rgba(56, 189, 248, 0.5);
      border-radius: 6px;
      overflow-x: auto;
    }

    .log-code pre {
      margin: 0;
      padding: 12px;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .log-code code {
      color: #a1f1e8;
    }

    .keyword { color: #f472b6; font-weight: 600; }
    .string { color: #86efac; }
    .number { color: #fbbf24; }
    .literal { color: #f87171; }
    .comment { color: #64748b; font-style: italic; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Water Billing App</h1>
    <p>Fast and clean billing workflows for dashboard users. Sign in, register, or open your dashboard directly.</p>
    <div class="buttons">
      <a class="button button-primary" href="login.html">Sign in</a>
      <a class="button button-secondary" href="signup.html">Register</a>
      <a class="button button-secondary" href="botweb.html">Open dashboard</a>
    </div>
    <footer>
      <p>Built for simple water billing and record management.</p>
    </footer>
  </div>

  <!-- Code Viewer Section -->
  <div class="code-viewer-section">
    <h2>📝 Server Logs & API Examples</h2>
    <div class="code-controls">
      <input type="text" id="codeFilter" placeholder="Filter logs by keyword (e.g., 'POST', 'signup', 'records')...">
      <button id="clearLogs">Clear Logs</button>
      <button id="exportLogs">Export</button>
    </div>
    <div class="logs-container" id="codeLogsContainer">
      <div class="log-entry" style="padding: 40px; text-align: center; color: #64748b;">
        Loading code viewer...
      </div>
    </div>
  </div>

  <script src="/code-viewer.js"></script>
</body>
</html>
