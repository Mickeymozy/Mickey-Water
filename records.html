<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Billing — Local JSON Manager</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      color-scheme: dark;
      color: #f1f5f9;
      background: #020617;
      accent-color: #38bdf8;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --card-bg: rgba(15, 23, 42, 0.7);
      --border-color: rgba(255, 255, 255, 0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #020617;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at bottom left, rgba(37, 99, 235, 0.05) 0%, transparent 50%);
      z-index: -1;
    }

    .nav-header {
      width: min(950px, 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .btn-back {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-back:hover { color: #38bdf8; }

    .manager-card {
      width: min(950px, 100%);
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      box-shadow: 0 40px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .tabs-header {
      display: flex;
      background: rgba(2, 6, 23, 0.4);
      border-bottom: 1px solid var(--border-color);
    }

    .tab-btn {
      flex: 1;
      padding: 18px;
      background: transparent;
      border: none;
      color: #94a3b8;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s ease;
    }

    .tab-btn:hover { color: #f8fafc; background: rgba(255,255,255,0.01); }
    .tab-btn.active {
      color: #38bdf8;
      background: rgba(15, 23, 42, 0.5);
      border-bottom: 3px solid #38bdf8;
    }

    .tab-content { padding: 35px; display: none; }
    .tab-content.active { display: block; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 25px;
    }
    @media (max-width: 650px) { .form-grid { grid-template-columns: 1fr; } }

    .input-wrapper { display: flex; flex-direction: column; gap: 8px; }
    .input-wrapper label { font-size: 0.85rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
    
    input, select {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(2, 6, 23, 0.4);
      color: white;
      font-size: 0.95rem;
      outline: none;
    }
    input:focus, select:focus { border-color: #38bdf8; background: rgba(2, 6, 23, 0.6); }

    .calc-preview-bar {
      background: rgba(56, 189, 248, 0.05);
      border: 1px solid rgba(56, 189, 248, 0.15);
      padding: 18px;
      border-radius: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .btn-action {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
      color: white;
    }
    .btn-action:hover { filter: brightness(1.1); transform: translateY(-1px); }

    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    th { background: rgba(2, 6, 23, 0.3); color: #38bdf8; font-size: 0.9rem; text-transform: uppercase; }
    tr:hover { background: rgba(255,255,255,0.01); }

    .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
    .badge.paid { background: rgba(16, 185, 129, 0.1); color: #34d399; }
    .badge.pending { background: rgba(245, 158, 11, 0.1); color: #fbbf24; }

    .btn-delete {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.15);
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-delete:hover { background: #ef4444; color: white; }
  </style>
</head>
<body>

  <div class="bg-overlay" aria-hidden="true"></div>

  <div class="nav-header">
    <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Home Hub</a>
    <h2 style="font-weight: 800; letter-spacing: -0.5px;">Water Invoice Panel</h2>
  </div>

  <div class="manager-card">
    
    <div class="tabs-header">
      <button class="tab-btn active" onclick="switchTab(event, 'tab-create')">
        <i class="fa-solid fa-file-invoice-dollar"></i> Create New Invoice & SMS
      </button>
      <button class="tab-btn" onclick="switchTab(event, 'tab-view'); fetchLocalRecords();">
        <i class="fa-solid fa-database"></i> View JSON Stored Records
      </button>
    </div>

    <div id="tab-create" class="tab-content active">
      <form id="waterForm" onsubmit="saveWaterInvoice(event)">
        <div class="form-grid">
          <div class="input-wrapper">
            <label>Jina la Mteja</label>
            <input type="text" id="wName" placeholder="Mfa. Juma Hamisi" required>
          </div>
          <div class="input-wrapper">
            <label>Namba ya Simu</label>
            <input type="tel" id="wPhone" placeholder="Mfa. 0712345678" required>
          </div>
          <div class="input-wrapper">
            <label>Unit za Mwanzo (Previous Reading)</label>
            <input type="number" id="wPrev" value="0" min="0" oninput="calculateUnitsUsed()" required>
          </div>
          <div class="input-wrapper">
            <label>Unit za Sasa (Current Reading)</label>
            <input type="number" id="wCurr" value="0" min="0" oninput="calculateUnitsUsed()" required>
          </div>
          <div class="input-wrapper">
            <label>Gharama kwa kila Unit (TZS)</label>
            <input type="number" id="wPrice" value="2000" min="0" oninput="calculateUnitsUsed()" required>
          </div>
          <div class="input-wrapper">
            <label>Hali ya Ankara (Status)</label>
            <select id="wStatus">
              <option value="Pending">Inasubiri (Pending)</option>
              <option value="Paid">Imelipwa (Paid)</option>
            </select>
          </div>
        </div>

        <div class="calc-preview-bar">
          <div>
            <span style="color:#94a3b8; font-size:0.85rem; font-weight:700; display:block; text-transform:uppercase;">Unit Zilizotumika</span>
            <span id="lblUnits" style="font-size:1.4rem; font-weight:800; color:#38bdf8;">0 Units</span>
          </div>
          <div style="text-align: right;">
            <span style="color:#94a3b8; font-size:0.85rem; font-weight:700; display:block; text-transform:uppercase;">Jumla ya Gharama</span>
            <span id="lblTotal" style="font-size:1.4rem; font-weight:800; color:#10b981;">0 TZS</span>
          </div>
        </div>

        <button type="submit" class="btn-action">
          <i class="fa-solid fa-square-plus"></i> Hifadhi Kwenye JSON & Tuma SMS
        </button>
      </form>
    </div>

    <div id="tab-view" class="tab-content">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Mteja</th>
              <th>Simu</th>
              <th>Vipimo (Readings)</th>
              <th>Unit Zilizotumika</th>
              <th>Jumla (TZS)</th>
              <th>Hali</th>
              <th>Kitendo</th>
            </tr>
          </thead>
          <tbody id="jsonTableBody">
            <tr><td colspan="7" style="text-align:center; color:#64748b; padding:30px;">Hakuna data.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    function switchTab(event, tabId) {
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    function calculateUnitsUsed() {
      const prev = Number(document.getElementById('wPrev').value) || 0;
      const curr = Number(document.getElementById('wCurr').value) || 0;
      const price = Number(document.getElementById('wPrice').value) || 0;

      let unitsUsed = curr - prev;
      if (unitsUsed < 0) unitsUsed = 0;

      const totalBill = unitsUsed * price;
      document.getElementById('lblUnits').innerText = `${unitsUsed.toLocaleString()} Units`;
      document.getElementById('lblTotal').innerText = `${totalBill.toLocaleString()} TZS`;
    }

    // ================= PURE LOCAL JSON ENGINE =================
    function getRecordsFromStorage() {
      const stored = localStorage.getItem('water_billing_records');
      return stored ? JSON.parse(stored) : [];
    }

    function saveWaterInvoice(event) {
      event.preventDefault();

      const name = document.getElementById('wName').value;
      const phone = document.getElementById('wPhone').value;
      const prev = Number(document.getElementById('wPrev').value);
      const curr = Number(document.getElementById('wCurr').value);
      const price = Number(document.getElementById('wPrice').value);
      const status = document.getElementById('wStatus').value;

      let unitsUsed = curr - prev;
      if (unitsUsed < 0) {
        alert("Hitilafu: Unit za sasa haziwezi kuwa ndogo kuliko za mwanzo!");
        return;
      }
      const amount = unitsUsed * price;

      // Tengeneza Object ya JSON
      const newRecord = {
        id: 'rec_' + Date.now(),
        name,
        phone,
        prev,
        curr,
        unitsUsed,
        amount,
        status,
        date: new Date().toLocaleDateString()
      };

      // Hifadhi kwenye Local Storage kama JSON string
      const currentRecords = getRecordsFromStorage();
      currentRecords.push(newRecord);
      localStorage.setItem('water_billing_records', JSON.stringify(currentRecords));

      // Mfumo wa kutuma SMS ya kawaida kiotomatiki
      const smsText = `Ndugu ${name}, Ankara yako ya maji: Unit zilizotumika ni ${unitsUsed}. Jumla ya Malipo ni TZS ${amount.toLocaleString()}. Hali: ${status}. Ahsante!`;
      window.location.href = `sms:${phone}?&body=${encodeURIComponent(smsText)}`;

      // Safisha Form
      document.getElementById('waterForm').reset();
      calculateUnitsUsed();
      alert("Ankara imehifadhiwa kwenye JSON ya Browser na App ya SMS imefunguka!");
    }

    function fetchLocalRecords() {
      const records = getRecordsFromStorage();
      const tbody = document.getElementById('jsonTableBody');
      tbody.innerHTML = '';

      if (records.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#64748b; padding:30px;">Hakuna ankara zilizohifadhiwa bado.</td></tr>`;
        return;
      }

      records.forEach(rec => {
        const row = document.createElement('tr');
        const badgeClass = rec.status === 'Paid' ? 'badge paid' : 'badge pending';

        row.innerHTML = `
          <td><strong>${rec.name}</strong></td>
          <td>${rec.phone}</td>
          <td style="font-size:0.85rem; color:#94a3b8;">${rec.prev} hadi ${rec.curr}</td>
          <td><i class="fa-solid fa-faucet-drip" style="color:#38bdf8;"></i> ${rec.unitsUsed} Units</td>
          <td style="font-weight:700; color:#10b981;">${rec.amount.toLocaleString()} TZS</td>
          <td><span class="${badgeClass}">${rec.status}</span></td>
          <td><button class="btn-delete" onclick="deleteLocalRecord('${rec.id}')"><i class="fa-solid fa-trash"></i></button></td>
        `;
        tbody.appendChild(row);
      });
    }

    function deleteLocalRecord(id) {
      if(!confirm("Je, una uhakika unataka kufuta rekodi hii?")) return;
      let records = getRecordsFromStorage();
      records = records.filter(rec => rec.id !== id);
      localStorage.setItem('water_billing_records', JSON.stringify(records));
      fetchLocalRecords();
    }
  </script>
</body>
</html>
