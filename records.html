<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Billing Records (JSON Database)</title>
  <style>
    :root {
      color-scheme: dark;
      background: #020617;
      color: #f8fafc;
      font-family: system-ui, sans-serif;
    }
    body { max-width: 900px; margin: auto; padding: 24px; }
    h1 { background: linear-gradient(135deg, #fff 30%, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .panel { background: #0f172a; padding: 24px; border-radius: 16px; border: 1px solid #1e293b; margin-bottom: 24px; }
    .form-group { display: grid; grid-template-columns: 2fr 1.2fr 1fr 1fr; gap: 12px; margin-top: 15px; }
    @media (max-width: 600px) { .form-group { grid-template-columns: 1fr; } }
    
    input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; font-size: 0.95rem; }
    button { background: #2563eb; font-weight: bold; cursor: pointer; border: none; }
    button:hover { background: #1d4ed8; }
    button.btn-delete { background: #dc2626; padding: 6px 12px; font-size: 0.85rem; }
    button.btn-delete:hover { background: #b91c1c; }

    table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
    th, td { padding: 14px; border-bottom: 1px solid #1e293b; }
    th { background: #1e293b; color: #38bdf8; }
    tr:hover { background: rgba(255,255,255,0.02); }

    .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }
    .badge.paid { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge.pending { background: rgba(245,158,11,0.15); color: #fbbf24; }
    
    .nav-link { display: inline-block; margin-bottom: 15px; color: #38bdf8; text-decoration: none; font-size: 0.9rem; }
  </style>
</head>
<body>

  <a class="nav-link" href="index.html">← Rudi Mwanzo (Home)</a>
  <h1>📂 Ankara na Records (JSON Storage)</h1>
  <p style="color: #94a3b8; margin-top:-10px;">Mfumo huu unahifadhi data kwenye file la ndani la server moja kwa moja bila database ya nje.</p>

  <div class="panel">
    <h3>Weka Ankara Mpya</h3>
    <form id="recordForm" onsubmit="addRecord(event)">
      <div class="form-group">
        <input type="text" id="custName" placeholder="Jina la Mteja" required>
        <input type="text" id="custPhone" placeholder="Namba ya Simu">
        <input type="number" id="custAmount" placeholder="Kiasi (TZS)" required>
        <select id="custStatus">
          <option value="Pending">Inasubiri</option>
          <option value="Paid">Imelipwa</option>
        </select>
      </div>
      <button type="submit" style="margin-top:15px; width:100%;">Hifadhi Record Mpya</button>
    </form>
  </div>

  <div class="panel">
    <h3>Orodha ya Ankara Zilizopo</h3>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Mteja</th>
            <th>Namba ya Simu</th>
            <th>Kiasi</th>
            <th>Hali (Status)</th>
            <th>Muda</th>
            <th>Kitendo</th>
          </tr>
        </thead>
        <tbody id="recordsTableBody">
          <tr><td colspan="6" style="text-align:center; color:#94a3b8;">Inapakia data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Kuchukua na kuonyesha data pindi page inapofunguka
    async function fetchRecords() {
      try {
        const res = await fetch('/api/records');
        const result = await res.json();
        
        const tbody = document.getElementById('recordsTableBody');
        tbody.innerHTML = '';

        if (!result.data || result.data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#94a3b8;">Hakuna record yoyote iliyohifadhiwa bado.</td></tr>`;
          return;
        }

        result.data.forEach(rec => {
          const row = document.createElement('tr');
          const statusBadge = rec.status === 'Paid' ? '<span class="badge paid">Imelipwa</span>' : '<span class="badge pending">Inasubiri</span>';
          const dateFormatted = new Date(rec.createdAt).toLocaleString('en-US', { hour12: true });

          row.innerHTML = `
            <td><strong>${rec.name}</strong></td>
            <td>${rec.phone}</td>
            <td style="color:#38bdf8; font-weight:bold;">${Number(rec.amount).toLocaleString()} TZS</td>
            <td>${statusBadge}</td>
            <td style="font-size:0.85rem; color:#94a3b8;">${dateFormatted}</td>
            <td><button class="btn-delete" onclick="deleteRecord('${rec.id}')">Futa</button></td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        document.getElementById('recordsTableBody').innerHTML = `<tr><td colspan="6" style="text-align:center; color:#ef4444;">Imeshindwa kuunganisha na Server!</td></tr>`;
      }
    }

    // Kuongeza record mpya
    async function addRecord(event) {
      event.preventDefault();
      
      const name = document.getElementById('custName').value;
      const phone = document.getElementById('custPhone').value;
      const amount = document.getElementById('custAmount').value;
      const status = document.getElementById('custStatus').value;

      // Kuchukua device metrics za browser kwa ushirikiano
      const deviceMetrics = {
        platform: navigator.platform,
        userAgent: navigator.userAgent,
        screenSize: `${window.innerWidth}x${window.innerHeight}`
      };

      try {
        const res = await fetch('/api/records', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, amount, status, deviceMetrics })
        });
        
        const result = await res.json();
        if (result.success) {
          document.getElementById('recordForm').reset();
          fetchRecords(); // Refresh table
        } else {
          alert("Error: " + result.error);
        }
      } catch (err) {
        alert("Imeshindwa kuhifadhi record. Hakikisha server ipo hewani.");
      }
    }

    // Kufuta record
    async function deleteRecord(id) {
      if (!confirm("Je, una uhakika unataka kufuta kabisa ankara hii?")) return;

      try {
        const res = await fetch(`/api/records/${id}`, { method: 'DELETE' });
        const result = await res.json();
        if (result.success) {
          fetchRecords(); // Refresh table
        } else {
          alert("Error: " + result.error);
        }
      } catch (err) {
        alert("Imeshindwa kufuta.");
      }
    }

    // Run tunapofungua ukurasa
    window.onload = fetchRecords;
  </script>
</body>
</html>
