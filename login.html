<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Billing System - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #e2e8f0;
        }
        .container {
            background: #111827;
            border: 1px solid #334155;
            border-radius: 20px;
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .header {
            background: rgba(30, 41, 59, 0.5);
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        .content { padding: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #94a3b8; }
        input {
            width: 100%; padding: 12px; border-radius: 10px;
            background: #090f1f; border: 1px solid #334155;
            color: white; font-size: 1em;
        }
        button {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            font-weight: bold; font-size: 1em; cursor: pointer; margin-top: 10px;
        }
        .btn-submit { background: #2563eb; color: white; }
        .btn-bypass { background: transparent; border: 1px dashed #38bdf8; color: #38bdf8; margin-top: 15px; }
        .divider { text-align: center; margin: 15px 0; color: #475569; font-size: 0.85em; }
        .message { padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 0.9em; text-align: center; }
        .error { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid #ef4444; }
        .success { background: rgba(34, 197, 94, 0.2); color: #86efac; border: 1px solid #22c55e; }
        .footer-link { text-align: center; margin-top: 20px; font-size: 0.9em; color: #94a3b8; }
        .footer-link a { color: #38bdf8; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🌊 Water Billing</h2>
            <p style="color:#94a3b8; font-size:0.85em;">Sign in to manage system metrics</p>
        </div>
        <div class="content">
            <div id="msg" class="message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-submit">Sign In Account</button>
            </form>

            <div class="divider">OR QUICK ACCESS</div>
            <button class="btn-bypass" onclick="triggerBypass()">⚡ Direct Admin Dashboard Access</button>

            <div class="footer-link">
                Don't have an account? <a href="/signup">Register/Signup here</a>
            </div>
        </div>
    </div>

    <script>
        const msg = document.getElementById('msg');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await response.json();
                
                msg.style.display = 'block'; // Onyesha div ya message

                if (data.success) {
                    msg.className = 'message success';
                    msg.textContent = 'Success! Redirecting...';
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1000);
                } else {
                    msg.className = 'message error';
                    msg.textContent = data.error || 'Authentication failed';
                }
            } catch (err) {
                msg.style.display = 'block';
                msg.className = 'message error';
                msg.textContent = 'Server communication error';
            }
        });

        async function triggerBypass() {
            try {
                const res = await fetch('/api/admin-login', { method: 'POST' });
                const data = await res.json();
                if (data.success) window.location.href = data.redirect;
            } catch (e) { alert('Bypass server error'); }
        }
    </script>
</body>
</html>
