<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Billing | Login</title>
  <style>
    :root{--bg:#07111f;--surface:rgba(15,23,42,0.96);--border:rgba(148,163,184,0.18);--text:#eff6ff;--muted:#cbd5e1;--primary:#38bdf8;--accent:#2563eb;--success:#22c55e;--error:#f87171;}
    *{box-sizing:border-box;font-family:Segoe UI, Arial, sans-serif;}
    body{margin:0;min-height:100vh;background:linear-gradient(135deg,#020617,#0f172a 35%,#1e293b 100%);color:var(--text);display:grid;place-items:center;padding:24px;}
    .card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:24px;box-shadow:0 18px 40px rgba(8,15,30,0.45);}
    h1{margin:0 0 8px;font-size:1.7rem;}
    p{color:var(--muted);line-height:1.4;}
    .btn{display:block;width:100%;border:none;border-radius:12px;padding:12px 14px;font-weight:700;cursor:pointer;transition:.18s;}
    .btn:hover{transform:translateY(-1px);}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;}
    .btn-google{background:#fff;color:#111827;border:1px solid #dbe4ee;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;}
    .btn-secondary{background:rgba(148,163,184,0.12);color:var(--text);border:1px solid var(--border);}
    .field{display:grid;gap:6px;margin-top:14px;}
    .field label{font-size:.92rem;color:var(--muted);font-weight:600;}
    .field input{background:rgba(15,23,42,0.95);border:1px solid var(--border);border-radius:12px;padding:11px 12px;color:var(--text);font-size:1rem;}
    .field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(56,189,248,0.12);} 
    .actions{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:10px;}
    .link{color:var(--primary);text-decoration:none;font-weight:700;cursor:pointer;}
    .message{display:none;margin-top:12px;padding:10px 12px;border-radius:12px;font-weight:600;}
    .message.error{display:block;background:rgba(248,113,113,0.12);color:#fecaca;border:1px solid rgba(248,113,113,0.25);} 
    .message.success{display:block;background:rgba(34,197,94,0.12);color:#bbf7d0;border:1px solid rgba(34,197,94,0.25);} 
    .small{font-size:.95rem;color:var(--muted);margin-top:10px;text-align:center;}
    .modal{display:none;position:fixed;inset:0;background:rgba(2,6,23,0.78);align-items:center;justify-content:center;padding:16px;}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:420px;padding:18px;}
  </style>
</head>
<body>
  <main class="card">
    <h1>Water Billing Login</h1>
    <p>Sign in with email, Google, or use the reset password option below.</p>

    <a class="btn btn-google" href="/auth/google">G Sign in with Google</a>

    <form id="loginForm">
      <div class="field"><label for="email">Email</label><input id="email" type="email" required placeholder="you@example.com"></div>
      <div class="field"><label for="password">Password</label><input id="password" type="password" required placeholder="********"></div>
      <div class="actions">
        <button id="loginBtn" class="btn btn-primary" type="submit">Sign in</button>
        <a class="link" href="javascript:void(0)" onclick="openReset()">Forgot password?</a>
      </div>
    </form>

    <div id="msg" class="message"></div>
    <div class="small">No account yet? <a class="link" href="signup.html">Create one</a></div>
    <div class="small"><a class="link" href="index.html">Back to home</a></div>
  </main>

  <div id="resetModal" class="modal">
    <div class="modal-box">
      <h2 style="margin-top:0;">Forgot password</h2>
      <p>Enter your email and we will send reset instructions via SMTP.</p>
      <div class="field"><label for="resetEmail">Email</label><input id="resetEmail" type="email" placeholder="you@example.com"></div>
      <div class="actions">
        <button class="btn btn-secondary" type="button" onclick="closeReset()">Cancel</button>
        <button class="btn btn-primary" id="resetBtn" type="button" onclick="sendReset()">Send reset link</button>
      </div>
      <div id="resetMsg" class="message"></div>
    </div>
  </div>

  <script>
    const msg = document.getElementById('msg');

    function showMsg(text, type='error') {
      msg.className = 'message ' + type;
      msg.textContent = text;
    }

    function openReset(){ document.getElementById('resetModal').style.display='flex'; }
    function closeReset(){ document.getElementById('resetModal').style.display='none'; }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      try {
        btn.disabled = true;
        btn.textContent = 'Signing in...';
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Login failed');

        localStorage.setItem('authToken', 'session_' + Date.now());
        localStorage.setItem('user', JSON.stringify(data.user));
        localStorage.setItem('loginTime', new Date().toISOString());

        showMsg('Login successful. Redirecting...', 'success');
        setTimeout(() => {
          const isAdmin = data.user.email === 'mickidadyhamza@gmail.com' || data.user.role === 'admin';
          window.location.href = isAdmin ? '/admin.html' : '/records.html';
        }, 700);
      } catch (err) {
        showMsg(err.message || 'Unable to login', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });

    async function sendReset(){
      const email = document.getElementById('resetEmail').value.trim();
      const btn = document.getElementById('resetBtn');
      const resetMsg = document.getElementById('resetMsg');
      try {
        btn.disabled = true;
        btn.textContent = 'Sending...';
        const response = await fetch('/api/password-reset-request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        resetMsg.className = 'message ' + (response.ok ? 'success' : 'error');
        resetMsg.textContent = data.message || data.error || 'Reset request completed';
      } catch (err) {
        resetMsg.className = 'message error';
        resetMsg.textContent = 'Unable to send reset email.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send reset link';
      }
    }
  </script>
</body>
</html>
