<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Billing System - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #111827;
            border: 1px solid #334155;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            animation: slideIn 0.5s ease-out;
            color: #e2e8f0;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid rgba(148,163,184,.12);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            color: #94a3b8;
            font-size: 0.9em;
        }

        .content {
            padding: 40px;
        }

        .admin-bypass {
            background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
            border-radius: 12px;
            padding: 2px;
            margin-bottom: 30px;
        }

        .admin-btn {
            width: 100%;
            background: #111827;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            color: #38bdf8;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .admin-btn:hover {
            background: transparent;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3);
        }

        .admin-btn:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: #334155;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: #111827;
            padding: 0 15px;
            color: #94a3b8;
            font-size: 0.9em;
        }

        .message {
            margin-top: 20px;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            display: none;
            font-size: 0.95em;
        }

        .message.error {
            background: rgba(248, 113, 113, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(248, 113, 113, 0.3);
            display: block;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
            display: block;
        }

        .message.warning {
            background: rgba(245, 158, 11, 0.15);
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.3);
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(56, 189, 248, 0.3);
            border-radius: 50%;
            border-top-color: #38bdf8;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-icon {
            font-size: 1.2em;
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            font-size: 0.85em;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            .container {
                margin: 20px;
            }

            .content {
                padding: 30px;
            }

            .header {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 Water Billing System</h1>
            <p>Manage water bills efficiently</p>
        </div>

        <div class="content">
            <div class="admin-bypass">
                <button class="admin-btn" onclick="adminLogin()">
                    <span class="btn-icon">👨‍💼</span>
                    Admin Login (One-Click Access)
                    <span class="btn-icon">⚡</span>
                </button>
            </div>

            <div class="divider">
                <span>System Status</span>
            </div>

            <div class="info-text">
                <p>💡 <strong>Quick Access:</strong> Click the button above to login instantly. If the server is offline, the system will switch to <strong>LocalStorage Mode</strong> automatically.</p>
                <p style="margin-top: 10px;">💾 Database Support: MongoDB (Online) & LocalStorage (Offline)</p>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        // Jina la ukurasa wa dashboard/records (Hakikisha jina liko sahihi kulingana na setup yako)
        const DASHBOARD_URL = '/records'; 

        async function adminLogin() {
            const messageDiv = document.getElementById('message');
            const adminBtn = document.querySelector('.admin-btn');

            const originalText = adminBtn.innerHTML;
            adminBtn.innerHTML = '<span class="loading"></span> Authenticating...';
            adminBtn.disabled = true;

            try {
                // Jaribu kuwasiliana na server kwanza
                const response = await fetch('/api/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    // Imefanikiwa kupitia server (MongoDB Mode)
                    localStorage.setItem('login_mode', 'mongodb');
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Connected to MongoDB! Redirecting...';
                    messageDiv.style.display = 'block';

                    setTimeout(() => {
                        window.location.href = DASHBOARD_URL;
                    }, 1200);
                } else {
                    throw new Error(data.error || 'Server rejected login');
                }
            } catch (error) {
                console.warn('Server haipatikani, tunahamia Offline Mode...', error);
                
                // Server imegoma au haipo, tunamwingiza mtumiaji kwa nguvu (Offline/LocalStorage)
                localStorage.setItem('login_mode', 'offline_activated');
                
                messageDiv.className = 'message warning';
                messageDiv.innerHTML = '⚠️ Server Offline! Entering LocalStorage Mode...';
                messageDiv.style.display = 'block';

                setTimeout(() => {
                    // Kama hizi file zote zipo kwenye folder moja la kawaida (bila kutumia router ya node)
                    // unaweza kubadilisha DASHBOARD_URL iwe 'index.html' au jina la lile file la records.
                    window.location.href = DASHBOARD_URL; 
                }, 1500);
            }
        }

        // Kuangalia kama session ipo hai pindi ukurasa unapofunguka
        async function checkSession() {
            // Kama tayari alishaingia kwa njia ya offline, mpeleke moja kwa moja kwenye records ukurasa ukifunguka
            if(localStorage.getItem('login_mode') === 'offline_activated') {
                window.location.href = DASHBOARD_URL;
                return;
            }

            try {
                const response = await fetch('/api/me', { credentials: 'include' });
                const data = await response.json();
                if (data.authenticated) {
                    localStorage.setItem('login_mode', 'mongodb');
                    window.location.href = DASHBOARD_URL;
                }
            } catch (error) {
                console.log('No active server session found (Using offline bypass ready)');
            }
        }

        // Washa ukaguzi wa session ukurasa unapoload
        checkSession();

        // Njia ya mkato ya keyboard (Ctrl + Shift + A)
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'A') {
                e.preventDefault();
                adminLogin();
            }
        });
    </script>
</body>
</html>
