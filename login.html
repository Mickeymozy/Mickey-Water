<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Billing System - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .content {
            padding: 40px;
        }

        .admin-bypass {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 30px;
        }

        .admin-btn {
            width: 100%;
            background: white;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            color: #ee5a24;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(238, 90, 36, 0.3);
        }

        .admin-btn:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #999;
            font-size: 0.9em;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
            display: block;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-icon {
            font-size: 1.2em;
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 0.85em;
        }

        .info-text a {
            color: #667eea;
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .container {
                margin: 20px;
            }
            
            .content {
                padding: 30px;
            }
            
            .header {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 Water Billing System</h1>
            <p>Manage water bills efficiently</p>
        </div>
        
        <div class="content">
            <!-- Admin Bypass Button -->
            <div class="admin-bypass">
                <button class="admin-btn" onclick="adminLogin()">
                    <span class="btn-icon">👨‍💼</span>
                    Admin Login (One-Click Access)
                    <span class="btn-icon">⚡</span>
                </button>
            </div>
            
            <div class="divider">
                <span>OR</span>
            </div>
            
            <!-- Regular Login Form (Disabled/Visual Only) -->
            <div style="opacity: 0.5; pointer-events: none;">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" value="admin@waterbilling.com">
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password" value="admin123">
                </div>
                
                <button class="login-btn" disabled>
                    Login with Credentials
                </button>
            </div>
            
            <div id="message" class="message"></div>
            
            <div class="info-text">
                <p>💡 <strong>Quick Access:</strong> Click the <strong>Admin Login</strong> button above to access the system instantly.</p>
                <p style="margin-top: 10px;">No registration or credentials needed for demo access.</p>
            </div>
        </div>
    </div>

    <script>
        async function adminLogin() {
            const messageDiv = document.getElementById('message');
            const adminBtn = document.querySelector('.admin-btn');
            
            // Show loading state
            const originalText = adminBtn.innerHTML;
            adminBtn.innerHTML = '<span class="loading"></span> Logging in...';
            adminBtn.disabled = true;
            
            try {
                // Try both endpoints for compatibility
                let response = await fetch('/api/admin-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include' // Important for session
                });
                
                // If admin-login endpoint doesn't exist, try regular login
                if (!response.ok) {
                    response = await fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            email: 'admin@waterbilling.com',
                            password: 'admin123'
                        }),
                        credentials: 'include'
                    });
                }
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Login successful! Redirecting...';
                    
                    // Redirect to main page after short delay
                    setTimeout(() => {
                        window.location.href = '/main';
                    }, 1000);
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Network error. Please make sure the server is running.';
                
                // Reset button
                adminBtn.innerHTML = originalText;
                adminBtn.disabled = false;
                
                // Try alternative approach - direct redirect
                setTimeout(() => {
                    if (confirm('Server connection issue. Try direct access?')) {
                        window.location.href = '/main';
                    }
                }, 2000);
            }
        }
        
        // Auto-check if already logged in
        async function checkSession() {
            try {
                const response = await fetch('/api/me', {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.authenticated) {
                    // Already logged in, redirect to main
                    window.location.href = '/main';
                }
            } catch (error) {
                console.log('Not logged in');
            }
        }
        
        // Check session on page load
        checkSession();
        
        // Add keyboard shortcut (Ctrl+Shift+A for admin login)
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'A') {
                e.preventDefault();
                adminLogin();
            }
        });
    </script>
</body>
</html>
