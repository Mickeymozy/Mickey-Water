<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingia | Mickey Water</title>
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#2563eb;--primary-dark:#1d4ed8;--bg:#0f172a;--surface:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.1);--text:#f8fafc;--text2:rgba(255,255,255,0.7)}
    body{min-height:100vh;font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
    .nav{padding:16px 24px;display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto;width:100%}
    .logo{font-size:1.2rem;font-weight:800;display:flex;align-items:center;gap:8px;color:var(--text);text-decoration:none}
    .logo-icon{width:32px;height:32px;background:var(--primary);border-radius:8px;display:grid;place-items:center;font-size:0.9rem}
    .nav-links{display:flex;gap:8px}
    .nav-links a{color:var(--text2);text-decoration:none;font-weight:600;font-size:0.85rem;padding:8px 14px;border-radius:10px;transition:0.2s}
    .nav-links a:hover{background:var(--surface)}
    .page{flex:1;display:grid;place-items:center;padding:24px}
    .card{width:min(440px,100%);background:#ffffff;border-radius:24px;padding:40px 36px;box-shadow:0 25px 60px rgba(0,0,0,0.4);color:#0f172a}
    .card-header{margin-bottom:28px}
    .card-header h1{font-size:1.7rem;font-weight:800;margin-bottom:6px}
    .card-header p{color:#64748b;font-size:0.95rem;line-height:1.6}
    .field{margin-bottom:18px}
    .field label{display:block;margin-bottom:6px;font-weight:600;color:#334155;font-size:0.88rem}
    .field input{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid #e2e8f0;font-size:0.95rem;transition:all 0.2s;background:#f8fafc;outline:none}
    .field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,0.1);background:#fff}
    .field .input-hint{font-size:0.8rem;color:#94a3b8;margin-top:4px}
    .show-pw{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:0.82rem;color:#64748b;cursor:pointer;user-select:none}
    .show-pw input{width:auto}
    .submit-btn{width:100%;padding:14px;border-radius:12px;border:none;color:#fff;background:var(--primary);font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.2s;margin-top:8px}
    .submit-btn:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 12px 30px rgba(37,99,235,0.2)}
    .submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    .links{display:flex;justify-content:space-between;gap:12px;margin-top:20px;font-size:0.88rem}
    .links a{color:var(--primary);text-decoration:none;font-weight:600}
    .links a:hover{text-decoration:underline}
    .divider{text-align:center;margin:20px 0;color:#94a3b8;font-size:0.85rem;position:relative}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:calc(50% - 20px);height:1px;background:#e2e8f0}
    .divider::before{left:0}
    .divider::after{right:0}
    .alert{padding:12px 16px;border-radius:10px;font-size:0.88rem;margin-bottom:16px;display:none;font-weight:600}
    .alert.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
    .alert.success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
    .alert.show{display:block}
    @media(max-width:480px){.card{padding:28px 20px;border-radius:20px}}
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="logo"><div class="logo-icon">MW</div> Mickey Water</a>
    <div class="nav-links">
      <a href="/">Nyumbani</a>
      <a href="/signup">Jisajili</a>
    </div>
  </nav>

  <main class="page">
    <section class="card">
      <div class="card-header">
        <h1>Karibu Tena!</h1>
        <p>Ingia kwenye akaunti yako ili kuendelea kusimamia ankara zako za maji.</p>
      </div>
      <div id="alert" class="alert"></div>
      <form id="loginForm">
        <div class="field">
          <label for="email">Barua pepe (Email)</label>
          <input id="email" type="email" placeholder="mfano@email.com" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Neno la siri (Password)</label>
          <input id="password" type="password" placeholder="Ingiza neno la siri" required autocomplete="current-password">
          <label class="show-pw"><input type="checkbox" onchange="togglePw()"> Onyesha password</label>
        </div>
        <button class="submit-btn" type="submit" id="submitBtn">Ingia</button>
      </form>
      <div class="links">
        <a href="/signup">Fungua Akaunti</a>
        <a href="/reset-password">Umesahau Password?</a>
      </div>
    </section>
  </main>

  <script>
    function togglePw() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert ' + type + ' show';
      setTimeout(() => el.classList.remove('show'), 5000);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      btn.disabled = true;
      btn.textContent = 'Inaendelea...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
          cache: 'no-cache'
        });
        const data = await res.json();
        if (!res.ok) {
          showAlert(data.error || 'Login imeshindwa. Angalia taarifa zako.', 'error');
          btn.disabled = false;
          btn.textContent = 'Ingia';
          return;
        }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showAlert('Umeingia vizuri! Inaelekeza...', 'success');
        setTimeout(() => {
          window.location.href = data.user.user_type === 'admin' ? '/admin-dashboard.html' : '/dashboard.html';
        }, 500);
      } catch (err) {
        showAlert('Huwezi kuunganisha na seva. Hakikisha intaneti yako inafanya kazi.', 'error');
        btn.disabled = false;
        btn.textContent = 'Ingia';
      }
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
  </script>
</body>
</html>
