<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Billing System - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .content {
            padding: 40px;
        }

        .admin-bypass {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 30px;
        }

        .admin-btn {
            width: 100%;
            background: white;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            color: #ee5a24;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(238, 90, 36, 0.3);
        }

        .admin-btn:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #999;
            font-size: 0.9em;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
            display: block;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-icon {
            font-size: 1.2em;
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 0.85em;
        }

        @media (max-width: 480px) {
            .container {
                margin: 20px;
            }
            
            .content {
                padding: 30px;
            }
            
            .header {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 Water Billing System</h1>
            <p>Manage water bills efficiently</p>
        </div>
        
        <div class="content">
            <div class="admin-bypass">
                <button class="admin-btn" onclick="adminLogin()">
                    <span class="btn-icon">👨‍💼</span>
                    Admin Login (One-Click Access)
                    <span class="btn-icon">⚡</span>
                </button>
            </div>
            
            <div class="divider">
                <span>System Info</span>
            </div>
            
            <div class="info-text">
                <p>💡 <strong>Quick Access:</strong> Click the <strong>Admin Login</strong> button above to access the system instantly.</p>
                <p style="margin-top: 10px;">📱 Features: Save records & auto-send SMS to customers</p>
                <p style="margin-top: 10px;">🔧 Server: Node.js + Express (Port 3000)</p>
            </div>
            
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        // Use relative URLs - no need to specify port since same origin
        async function adminLogin() {
            const messageDiv = document.getElementById('message');
            const adminBtn = document.querySelector('.admin-btn');
            
            const originalText = adminBtn.innerHTML;
            adminBtn.innerHTML = '<span class="loading"></span> Logging in...';
            adminBtn.disabled = true;
            
            try {
                const response = await fetch('/api/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Login successful! Redirecting to dashboard...';
                    messageDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/records';
                    }, 1000);
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Cannot connect to server. Make sure server is running on port 3000';
                messageDiv.style.display = 'block';
                
                adminBtn.innerHTML = originalText;
                adminBtn.disabled = false;
                
                // Show help message
                setTimeout(() => {
                    messageDiv.innerHTML = '❌ Cannot connect to server.<br><br>💡 Troubleshooting:<br>1. Run: node server.js<br>2. Check if port 3000 is free<br>3. Check firewall settings';
                }, 3000);
            }
        }
        
        async function checkSession() {
            try {
                const response = await fetch('/api/me', { credentials: 'include' });
                const data = await response.json();
                if (data.authenticated) {
                    window.location.href = '/records';
                }
            } catch (error) {
                console.log('Not logged in');
            }
        }
        
        checkSession();
        
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'A') {
                e.preventDefault();
                adminLogin();
            }
        });
    </script>
</body>
</html>
