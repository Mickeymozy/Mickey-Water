<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Mickey Water</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: grid; place-items: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #102a43; }
    .card { width: min(420px, 100%); background: #fff; border-radius: 28px; padding: 36px 28px; box-shadow: 0 30px 80px rgba(15, 23, 42, 0.18); }
    .card h1 { font-size: 2rem; margin-bottom: 14px; color: #0f172a; }
    .card p { color: #475569; margin-bottom: 24px; line-height: 1.7; }
    .field { margin-bottom: 18px; }
    .field label { display: block; margin-bottom: 8px; font-weight: 700; color: #334155; }
    .field input { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid #cbd5e1; font-size: 1rem; }
    .button { width: 100%; padding: 15px 16px; border-radius: 16px; border: none; color: white; background: #3b82f6; font-weight: 700; font-size: 1rem; cursor: pointer; }
    .button:hover { transform: translateY(-1px); box-shadow: 0 16px 30px rgba(59, 130, 246, 0.24); }
    .links { display: flex; justify-content: space-between; margin-top: 18px; gap: 12px; flex-wrap: wrap; }
    .links a { color: #2563eb; text-decoration: none; font-weight: 700; }
    .notice { margin-top: 16px; padding: 14px 16px; border-radius: 16px; background: #f8fafc; border: 1px solid #e2e8f0; color: #334155; }
  </style>
</head>
<body>
  <section class="card">
    <h1>Login</h1>
    <p>Enter your credentials to access the Mickey Water billing dashboard.</p>
    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button class="button" type="submit">Login</button>
    </form>
    <div class="links">
      <a href="signup.html">Create account</a>
      <a href="reset-password.html">Forgot password?</a>
    </div>
    <div class="notice">Admin email: <strong>mickidadyhamza@gmail.com</strong></div>
  </section>
  <script>
    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const result = await response.json();
        if (!response.ok) {
          return alert(result.error || 'Login failed. Please check your credentials.');
        }
        localStorage.setItem('token', result.token);
        localStorage.setItem('user', JSON.stringify(result.user));
        if (result.user.user_type === 'admin') {
          window.location.href = '/admin';
        } else {
          window.location.href = '/dashboard';
        }
      } catch (error) {
        alert('Unable to connect to the server. Start the app with npm start and open it at http://localhost:3000');
      }
    });
  </script>
</body>
</html>
