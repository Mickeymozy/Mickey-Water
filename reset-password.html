<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badilisha Password | Mickey Water</title>
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#2563eb;--primary-dark:#1d4ed8;--bg:#0f172a;--surface:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.1);--text:#f8fafc;--text2:rgba(255,255,255,0.7)}
    body{min-height:100vh;font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:grid;place-items:center;padding:24px}
    .card{width:min(480px,100%);background:#fff;border-radius:24px;padding:40px 36px;box-shadow:0 25px 60px rgba(0,0,0,0.4);color:#0f172a}
    .card-header{margin-bottom:24px}
    .card-header h1{font-size:1.6rem;font-weight:800;margin-bottom:6px}
    .card-header p{color:#64748b;font-size:0.92rem;line-height:1.6}
    .field{margin-bottom:18px}
    .field label{display:block;margin-bottom:6px;font-weight:600;color:#334155;font-size:0.88rem}
    .field input{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid #e2e8f0;font-size:0.95rem;transition:all 0.2s;background:#f8fafc;outline:none}
    .field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,0.1);background:#fff}
    .submit-btn{width:100%;padding:14px;border-radius:12px;border:none;color:#fff;background:var(--primary);font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.2s}
    .submit-btn:hover{background:var(--primary-dark);transform:translateY(-1px)}
    .submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    .links{margin-top:18px;text-align:center;font-size:0.88rem}
    .links a{color:var(--primary);text-decoration:none;font-weight:600}
    .alert{padding:12px 16px;border-radius:10px;font-size:0.88rem;margin-bottom:14px;display:none;font-weight:600}
    .alert.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
    .alert.success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
    .alert.show{display:block}
    .back-link{display:flex;align-items:center;gap:6px;color:var(--text2);text-decoration:none;font-size:0.9rem;font-weight:600;margin-bottom:20px}
    .back-link:hover{color:var(--text)}
    @media(max-width:480px){.card{padding:28px 20px}}
  </style>
</head>
<body>
  <section class="card">
    <a href="/login" class="back-link">← Rudi kwenye Login</a>
    <div class="card-header">
      <h1 id="title">Badilisha Password</h1>
      <p id="subtitle">Ingiza barua pepe yako ili kupokea kiungo cha kubadilisha password.</p>
    </div>
    <div id="alert" class="alert"></div>
    <form id="resetForm">
      <div class="field" id="emailField">
        <label for="email">Barua pepe</label>
        <input id="email" type="email" placeholder="mfano@email.com" required>
      </div>
      <div class="field" id="passwordField" style="display:none;">
        <label for="newPassword">Password mpya</label>
        <input id="newPassword" type="password" placeholder="Ingiza password mpya" minlength="6">
      </div>
      <button class="submit-btn" type="submit" id="actionButton">Tuma Kiungo</button>
    </form>
    <div class="links">
      <a href="/login">Kumbuka password yako? Ingia hapa</a>
    </div>
  </section>

  <script>
    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert ' + type + ' show';
      if (type !== 'success') setTimeout(() => el.classList.remove('show'), 5000);
    }

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (token) {
      document.getElementById('title').textContent = 'Weka Password Mpya';
      document.getElementById('subtitle').textContent = 'Ingiza password mpya ili kuendelea kutumia akaunti yako.';
      document.getElementById('emailField').style.display = 'none';
      document.getElementById('passwordField').style.display = 'block';
      document.getElementById('actionButton').textContent = 'Badilisha Password';
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('actionButton');
      btn.disabled = true;
      try {
        if (token) {
          const newPassword = document.getElementById('newPassword').value.trim();
          if (!newPassword || newPassword.length < 6) {
            showAlert('Password lazima iwe angalau herufi 6.', 'error');
            btn.disabled = false;
            return;
          }
          const res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, newPassword })
          });
          const data = await res.json();
          if (!res.ok) { showAlert(data.error || 'Imeshindwa kubadilisha password.', 'error'); btn.disabled = false; return; }
          showAlert('Password imebadilishwa! Unaelekezwa...', 'success');
          setTimeout(() => window.location.href = '/login', 1500);
        } else {
          const email = document.getElementById('email').value.trim();
          const res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });
          const data = await res.json();
          if (!res.ok) { showAlert(data.error || 'Imeshindwa kutuma kiungo.', 'error'); btn.disabled = false; return; }
          showAlert('Kiungo cha kubadilisha password kimetumwa kwenye email yako!', 'success');
          btn.disabled = false;
        }
      } catch (err) {
        showAlert('Huwezi kuunganisha na seva. Jaribu tena.', 'error');
        btn.disabled = false;
      }
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
  </script>
</body>
</html>
