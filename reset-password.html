<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Mickey Water</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: grid; place-items: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .card { width: min(520px, 100%); background: #fff; border-radius: 28px; padding: 34px 30px; box-shadow: 0 30px 80px rgba(15, 23, 42, 0.18); }
    h1 { font-size: 2rem; margin-bottom: 14px; color: #0f172a; }
    p { color: #475569; margin-bottom: 24px; line-height: 1.6; }
    .field { margin-bottom: 18px; }
    .field label { display: block; margin-bottom: 8px; font-weight: 700; color: #334155; }
    .field input { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid #cbd5e1; font-size: 1rem; }
    .button { width: 100%; padding: 15px 16px; border: none; border-radius: 16px; background: #3b82f6; color: white; font-weight: 700; cursor: pointer; }
    .button:hover { transform: translateY(-1px); box-shadow: 0 16px 30px rgba(59, 130, 246, 0.24); }
    .notice { margin-top: 18px; text-align: center; }
    .notice a { color: #2563eb; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <section class="card">
    <h1 id="title">Reset your password</h1>
    <p id="subtitle">Enter your email to receive a password reset link.</p>
    <form id="resetForm">
      <div class="field" id="emailField">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required>
      </div>
      <div class="field" id="passwordField" style="display:none;">
        <label for="newPassword">New password</label>
        <input id="newPassword" type="password" placeholder="••••••••">
      </div>
      <button class="button" type="submit" id="actionButton">Send reset link</button>
    </form>
    <div class="notice">Remembered your password? <a href="login.html">Login</a></div>
  </section>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');
    const emailField = document.getElementById('emailField');
    const passwordField = document.getElementById('passwordField');
    const actionButton = document.getElementById('actionButton');

    if (token) {
      title.textContent = 'Choose a new password';
      subtitle.textContent = 'Enter a new password to secure your account.';
      emailField.style.display = 'none';
      passwordField.style.display = 'block';
      actionButton.textContent = 'Reset password';
    }

    document.getElementById('resetForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      try {
        if (token) {
          const newPassword = document.getElementById('newPassword').value.trim();
          if (!newPassword) return alert('Please enter a new password');
          const res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, newPassword })
          });
          const data = await res.json();
          if (!res.ok) return alert(data.error || 'Unable to reset password');
          alert(data.message || 'Password reset successfully');
          window.location.href = 'login.html';
        } else {
          const email = document.getElementById('email').value.trim();
          const res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });
          const data = await res.json();
          if (!res.ok) return alert(data.error || 'Failed to send reset link');
          alert(data.message || 'Reset link sent to your email');
        }
      } catch (error) {
        alert('Unable to connect to the server. Start the app with npm start and open it at http://localhost:3000');
      }
    });
  </script>
</body>
</html>
